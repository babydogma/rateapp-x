<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>RateApp X</title>

<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png">
<link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0e0e0f" />

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}

html{
  height:100%;
  background:
    radial-gradient(circle at 20% 10%, rgba(212,175,55,0.08), transparent 40%),
    radial-gradient(circle at 80% 90%, rgba(184,134,11,0.05), transparent 50%),
    linear-gradient(160deg,#0e0e0f,#161618 60%,#0c0c0d);
  background-repeat:no-repeat;
  background-attachment:fixed;
}

body{
  min-height:100vh;
  color:#e7e3dc;
  background:transparent;
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
  -webkit-overflow-scrolling: touch;
  overscroll-behavior-y: none;
}

.header{padding:25px 20px 10px;text-align:center;font-size:24px;font-weight:600;letter-spacing:1px;color:#d4af37;}
.stats{text-align:center;font-size:15px;margin-bottom:20px;color:#c6b27a;}
.divider{height:1px;margin:0 30px 20px;background:linear-gradient(to right, transparent, rgba(212,175,55,0.5), transparent);}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px;padding:20px;padding-bottom:calc(120px + env(safe-area-inset-bottom));}

/* карточка */
.card{
  background:#1a1a1c;
  border-radius:18px;
  padding:14px;
  position:relative;
  box-shadow:0 20px 40px rgba(0,0,0,0.6);
  transition:transform .25s ease, box-shadow .25s ease, opacity .25s ease;
  opacity:0;
  transform:translateY(20px) scale(.98);
  animation:cardReveal .55s cubic-bezier(0.22,1,0.36,1) forwards;
}
@keyframes cardReveal{
  0%{opacity:0; transform:translateY(20px) scale(.98);}
  60%{opacity:1; transform:translateY(-6px) scale(1.01);}
  100%{opacity:1; transform:translateY(0) scale(1);}
}

/* при удалении — плавно скрываем */
.card.fade-out{
  opacity:0;
  transform:translateY(10px) scale(.98);
}

/* содержимое */
.card img{width:100%;height:150px;object-fit:cover;border-radius:14px;}
.delete-btn{position:absolute;top:10px;right:12px;font-size:18px;cursor:pointer;color:#c6b27a;}
textarea{width:100%;margin-top:10px;background:#141415;border:1px solid rgba(212,175,55,0.15);border-radius:12px;padding:8px;color:#e7e3dc;resize:none;font-size:13px;}
.rating{margin-top:8px;font-weight:600;color:#d4af37;}
.slider{width:100%;margin-top:8px;appearance:none;height:5px;border-radius:6px;background:#2a2a2c;}
.slider::-webkit-slider-thumb{appearance:none;width:16px;height:16px;border-radius:50%;background:#d4af37;}
.add-btn{
  position:fixed;
  right:28px;
  bottom:calc(28px + env(safe-area-inset-bottom));
  width:70px;height:70px;border-radius:50%;
  background:#111;border:1px solid rgba(212,175,55,0.4);
  display:flex;align-items:center;justify-content:center;font-size:32px;color:#d4af37;cursor:pointer;box-shadow:0 0 20px rgba(212,175,55,0.2);
}
#photoInput{display:none;}
.created{margin-top:10px;color:#c6b27a;font-size:13px;}
</style>
</head>
<body>

<div class="header">RateApp X</div>
<div class="stats" id="stats">Загрузка...</div>
<div class="divider"></div>
<div class="grid" id="grid"></div>

<label class="add-btn">+
  <input id="photoInput" type="file" accept="image/*">
</label>

<script>
/* --- Настройки Supabase (оставь как есть) --- */
const SUPABASE_URL = "https://qlogmylywwdbczxolidl.supabase.co";
const SUPABASE_KEY = "sb_publishable_nVqkHQmgMKoA_F_ft7yfXQ_OWjYq7f4";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* --- DOM --- */
const grid = document.getElementById("grid");
const stats = document.getElementById("stats");
const photoInput = document.getElementById("photoInput");

/* формат даты -> DD.MM.YYYY */
function formatDateSimple(datestr){
  if(!datestr) return "";
  const d = new Date(datestr);
  if(isNaN(d)) return "";
  const dd = String(d.getDate()).padStart(2,"0");
  const mm = String(d.getMonth()+1).padStart(2,"0");
  const yy = d.getFullYear();
  return `${dd}.${mm}.${yy}`;
}
function getGlowColor(rating){
  const hue = 10 + (rating * 4);
  return `hsl(${hue}, 80%, 55%)`;
}

/* Пересчитать и показать статистику (по текущему DOM) */
function updateStatsFromDOM(){
  const cards = Array.from(grid.querySelectorAll(".card"));
  const count = cards.length;
  if(count === 0){
    stats.textContent = "Пока нет карточек";
    return;
  }
  let sum = 0;
  cards.forEach(c => {
    const ratingText = c.querySelector(".rating")?.textContent || "0/10";
    const num = Number(ratingText.split("/")[0]) || 0;
    sum += num;
  });
  stats.textContent = `Средняя оценка: ${(sum/count).toFixed(1)} • Карточек: ${count}`;
}

/* --- построить DOM-карточку (возвращает элемент) --- */
function buildCardElement(card, index=0){
  const el = document.createElement("div");
  el.className = "card";
  el.style.animationDelay = (index * 0.07) + "s";
  el.style.boxShadow = `0 35px 60px -25px ${getGlowColor(card.rating || 0)}`;

  const createdAtRaw = card.created_at;

  el.innerHTML = `
    <img src="${card.image_url || ""}">
    <div class="delete-btn">✕</div>
    <textarea placeholder="Описание">${card.text || ""}</textarea>
    <div class="rating">${card.rating || 0}/10</div>
    <input type="range" min="0" max="10" value="${card.rating || 0}" class="slider">
    <div class="created">${formatDateSimple(createdAtRaw)}</div>
  `;

  // удалить — делаем плавное исчезновение в DOM и обновляем статистику
  el.querySelector(".delete-btn").onclick = async () => {
    if(!createdAtRaw){
      alert("Ошибка удаления: uuid/id не найден для этой карточки");
      return;
    }

    const { error: delError } = await supabaseClient
      .from("cards")
      .delete()
      .eq("created_at", createdAtRaw);

    if(delError){
      console.error(delError);
      alert("Ошибка удаления: " + (delError.message || delError));
      return;
    }

    // анимация исчезновения
    el.classList.add("fade-out");
    setTimeout(() => {
      if(el.parentNode) el.parentNode.removeChild(el);
      updateStatsFromDOM();
    }, 260);
  };

  // правка текста (локально + отправка)
  el.querySelector("textarea").oninput = debounce(async (e) => {
    const txt = e.target.value;
    await supabaseClient
      .from("cards")
      .update({ text: txt })
      .eq("created_at", createdAtRaw);
    // не перерисовываем — оставляем локально
  }, 700);

  // слайдер — локально обновляем, отправляем на сервер, НИКАК не перерисовываем всё
  const slider = el.querySelector(".slider");
  const ratingEl = el.querySelector(".rating");

  slider.addEventListener("change", async () => {
    const prev = Number(ratingEl.textContent.split("/")[0]) || 0;
    const newRating = Number(slider.value);

    // оптимистично обновляем UI
    ratingEl.textContent = newRating + "/10";
    el.style.boxShadow = `0 35px 60px -25px ${getGlowColor(newRating)}`;
    updateStatsFromDOM();

    // сохраняем в БД
    const { error: updateError } = await supabaseClient
      .from("cards")
      .update({ rating: newRating })
      .eq("created_at", createdAtRaw);

    if(updateError){
      // откатываем UI и статистику если ошибка
      console.error(updateError);
      ratingEl.textContent = prev + "/10";
      el.style.boxShadow = `0 35px 60px -25px ${getGlowColor(prev)}`;
      updateStatsFromDOM();
      alert("Ошибка обновления рейтинга: " + (updateError.message || updateError));
      return;
    }
    // всё ок — не перерисовываем
  });

  return el;
}

/* --- загрузка карточек и рендер --- */
async function loadCards(){
  const { data, error } = await supabaseClient
    .from("cards")
    .select("*")
    .order("created_at", { ascending: false });

  if(error){
    console.error(error);
    stats.textContent = "Ошибка загрузки";
    return;
  }

  grid.innerHTML = "";
  if(!data || data.length === 0){
    updateStatsFromDOM(); // покажет "Пока нет карточек"
    return;
  }

  data.forEach((card, i) => {
    const el = buildCardElement(card, i);
    grid.appendChild(el);
  });

  // статистика по DOM
  updateStatsFromDOM();
}

/* --- загрузка фото (storage) и вставка записи --- */
photoInput.addEventListener("change", async (e) => {
  const file = e.target.files[0];
  if(!file) return;

  const fileName = Date.now() + "-" + file.name;

  const { error: uploadError } = await supabaseClient
    .storage
    .from("photos")
    .upload(fileName, file);

  if(uploadError){
    console.error(uploadError);
    alert("Ошибка загрузки");
    return;
  }

  const { data } = supabaseClient
    .storage
    .from("photos")
    .getPublicUrl(fileName);

  const publicUrl = data.publicUrl;

  const { data: inserted, error: insertError } = await supabaseClient
    .from("cards")
    .insert([{
      image_url: publicUrl,
      text: "",
      rating: 0
    }])
    .select()
    .limit(1);

  if(insertError){
    console.error(insertError);
    alert("Ошибка записи в БД");
    return;
  }

  // вставляем новую карточку в начало (чтобы порядок был как в loadCards)
  const newCard = Array.isArray(inserted) ? inserted[0] : inserted;
  const el = buildCardElement(newCard, 0);
  // prepend чтобы появилась первой
  grid.insertBefore(el, grid.firstChild);
  updateStatsFromDOM();
  photoInput.value = "";
});

/* простая debounce для редактирования текста */
function debounce(fn, ms){
  let t;
  return (...a) => {
    clearTimeout(t);
    t = setTimeout(() => fn(...a), ms);
  };
}

/* старт */
loadCards();
</script>

</body>
</html>
