<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<title>RateApp X</title>

<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png">
<link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0e0e0f" />

<link rel="stylesheet" href="/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
<script src="/script.js" defer></script>
</head>
<body>

<div class="header">RateApp X</div>
<div class="stats" id="stats">Загрузка...</div>
<div class="divider"></div>

<div class="grid" id="grid"></div>

<!-- Нижняя панель с FAB внутри -->
<nav class="bottom-nav" role="navigation" aria-label="Navigation">
  <button class="nav-btn" id="homeBtn" title="Главная">🏠</button>

  <div class="fab-wrap">
    <!-- label содержит input:file — клик по кнопке откроет селектор -->
    <label class="fab-label" title="Добавить фото">
      <input id="photoInput" type="file" accept="image/*">
      <div class="fab" aria-hidden="true">+</div>
    </label>
  </div>

  <button class="nav-btn" id="catsBtn" title="Категории">📂</button>
</nav>

</body>
</html>
