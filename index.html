<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>RateApp X</title>

<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png">
<link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0e0e0f" />

<link rel="stylesheet" href="/style.css">

<!-- supabase + script подключаем defer чтобы скрипт запускался после парсинга -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
<script src="/script.js" defer></script>
</head>
<body>

<div class="header">RateApp X</div>
<div class="stats" id="stats">Загрузка...</div>
<div class="divider"></div>

<!-- основная сетка -->
<div class="grid" id="grid"></div>

<!-- скрытый input для загрузки (центральная кнопка внутри панели его откроет) -->
<input id="photoInput" type="file" accept="image/*" style="display:none;" aria-hidden="true"/>

<!-- Нижняя панель -->
<nav class="bottom-nav" role="navigation" aria-label="Навигация">
  <a class="nav-item" id="nav-home" href="/index.html" title="Главная">🏠</a>

  <!-- кнопка добавления внутри панели (меньше размера) -->
  <label for="photoInput" class="nav-add" title="Добавить фото">＋</label>

  <a class="nav-item" id="nav-cats" href="/categories.html" title="Категории">📂</a>
</nav>

</body>
</html>
