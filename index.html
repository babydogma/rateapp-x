<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RateApp X</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{
min-height:100vh;
overflow-x:hidden;
color:white;
background:
radial-gradient(circle at 15% 10%, rgba(59,130,246,0.15), transparent 45%),
radial-gradient(circle at 85% 90%, rgba(0,180,255,0.1), transparent 40%),
linear-gradient(160deg,#070c1a,#0f1f44 60%,#0b1a38);
}

.header{
padding:20px;
font-size:22px;
font-weight:600;
text-align:center;
}

.divider{
height:1px;
margin:15px 25px;
background:linear-gradient(to right, transparent, rgba(255,255,255,0.4), transparent);
}

.top-section{
margin:10px 20px 20px;
padding:20px;
border-radius:22px;
background:rgba(255,255,255,0.06);
backdrop-filter:blur(20px);
}

.top-title{
text-align:center;
margin-bottom:20px;
font-weight:600;
letter-spacing:1px;
}

.podium{
display:flex;
align-items:flex-end;
justify-content:center;
gap:15px;
height:140px;
}

.place{
flex:1;
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-end;
border-radius:16px;
background:rgba(255,255,255,0.08);
padding:10px;
text-align:center;
font-size:12px;
overflow:hidden;
}

.place img{
width:100%;
height:60px;
object-fit:cover;
border-radius:10px;
margin-bottom:6px;
}

.place.first{ height:130px; }
.place.second{ height:100px; }
.place.third{ height:85px; }

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:18px;
padding:22px;
padding-bottom:120px;
}

.card{
position:relative;
background:rgba(255,255,255,0.06);
backdrop-filter:blur(28px);
border-radius:22px;
padding:14px;
transition:0.35s ease;
box-shadow:0 20px 50px rgba(0,0,0,0.45);
overflow:hidden;
}

.card::after{
content:"";
position:absolute;
left:0;
right:0;
bottom:0;
height:60%;
border-radius:22px;
background:var(--glowColor, transparent);
opacity:var(--glowOpacity, 0);
transition:0.4s ease;
pointer-events:none;
}

.card img{
width:100%;
height:155px;
object-fit:cover;
border-radius:16px;
}

.delete-btn{
position:absolute;
top:8px;
right:10px;
font-size:18px;
cursor:pointer;
opacity:0.8;
}

textarea{
width:100%;
margin-top:10px;
background:rgba(255,255,255,0.06);
border:none;
border-radius:14px;
padding:8px;
color:white;
resize:none;
font-size:13px;
}

.rating{
margin-top:8px;
font-weight:600;
}

.slider{
width:100%;
margin-top:8px;
appearance:none;
height:6px;
border-radius:6px;
background:rgba(255,255,255,0.08);
outline:none;
}

.slider::-webkit-slider-thumb{
appearance:none;
width:18px;
height:18px;
border-radius:50%;
background:white;
cursor:pointer;
}

.add-btn{
position:fixed;
right:28px;
bottom:28px;
width:72px;
height:72px;
border-radius:50%;
background:linear-gradient(135deg,#3b82f6,#2563eb);
display:flex;
align-items:center;
justify-content:center;
font-size:36px;
cursor:pointer;
box-shadow:0 15px 40px rgba(0,0,0,0.5);
}
</style>
</head>

<body>

<div class="header">RateApp X</div>

<div class="divider"></div>

<div class="top-section">
<div class="top-title">🏆 ТОП НЕДЕЛИ</div>
<div class="podium" id="podium"></div>
</div>

<div class="divider"></div>

<div class="grid" id="grid"></div>

<div class="add-btn" onclick="openFilePicker()">+</div>

<script>

const STORAGE_KEY="rateapp_top_v1"

let state={ cards:[] }

function save(){
localStorage.setItem(STORAGE_KEY,JSON.stringify(state))
}

function load(){
const data=localStorage.getItem(STORAGE_KEY)
if(data) state=JSON.parse(data)
}
load()

const grid=document.getElementById("grid")
const podium=document.getElementById("podium")

function renderTop(){
const weekAgo=Date.now()-7*24*60*60*1000

const weekly=state.cards
.filter(c=>c.createdAt>=weekAgo && c.rating>=1)
.sort((a,b)=>{
if(b.rating!==a.rating) return b.rating-a.rating
return b.createdAt-a.createdAt
})
.slice(0,3)

podium.innerHTML=""

const positions=["second","first","third"]

for(let i=0;i<3;i++){
const card=weekly[i]
const div=document.createElement("div")
div.className="place "+positions[i]

if(card){
div.innerHTML=`
<img src="${card.image}">
${card.rating}/10
`
}else{
div.innerHTML=`—`
}

podium.appendChild(div)
}
}

function renderCard(cardData,prepend=false){
const card=document.createElement("div")
card.className="card"

card.innerHTML=`
<img src="${cardData.image}">
<div class="delete-btn">✕</div>
<textarea placeholder="Описание">${cardData.text||""}</textarea>
<div class="rating">${cardData.rating}/10</div>
<input type="range" min="0" max="10" value="${cardData.rating}" class="slider">
`

if(prepend) grid.prepend(card)
else grid.appendChild(card)

card.querySelector(".delete-btn").onclick=()=>{
state.cards=state.cards.filter(c=>c.id!==cardData.id)
save()
renderAll()
}

card.querySelector("textarea").oninput=(e)=>{
cardData.text=e.target.value
save()
}

const slider=card.querySelector(".slider")
const rating=card.querySelector(".rating")

updateGlow(card,slider.value)

slider.oninput=()=>{
cardData.rating=Number(slider.value)
rating.textContent=slider.value+"/10"
updateGlow(card,slider.value)
save()
renderTop()
}
}

function renderAll(){
grid.innerHTML=""
state.cards.forEach(c=>renderCard(c,false))
renderTop()
}

renderAll()

function openFilePicker(){
const input=document.createElement("input")
input.type="file"
input.accept="image/*"
input.style.display="none"
document.body.appendChild(input)

input.addEventListener("change",function(e){
const file=e.target.files[0]
if(!file) return

const reader=new FileReader()
reader.onload=function(ev){
const newCard={
id:Date.now(),
image:ev.target.result,
text:"",
rating:0,
createdAt:Date.now()
}
state.cards.unshift(newCard)
save()
renderAll()
document.body.removeChild(input)
}
reader.readAsDataURL(file)
})

input.click()
}

function updateGlow(card,val){
let hue=(val/10)*170
card.style.setProperty("--glowColor",
`radial-gradient(circle at 50% 100%, hsla(${hue},100%,55%,0.4) 0%, transparent 70%)`)
card.style.setProperty("--glowOpacity", val/10)
}

</script>

</body>
</html>
