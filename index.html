<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>RateApp X</title>

<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png">
<link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0e0e0f" />

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

  <!-- =========================
       IMAGE MODAL
  ========================== -->
  <div id="imageModal" class="image-modal">
    <img id="modalImg" alt="Preview">
  </div>

  <!-- =========================
       APP WRAPPER
  ========================== -->
  <main class="app">

    <!-- Header -->
    <header class="header">
  <div class="app-title logo-shine">
  <div class="logo-text">RateApp X</div>
</div>
</header>

    <div class="divider"></div>

    <!-- Stats -->
    <section class="stats" id="stats">
      Загрузка...
    </section>
    
    <div class="divider"></div>

    <!-- =========================
         RATING FILTERS
    ========================== -->
    <section class="rating-filters">

<button id="filterGood" class="rating-filter" data-filter="good">
🤩
</button>

<button id="filterMid" class="rating-filter" data-filter="mid">
😏
</button>

<button id="filterBad" class="rating-filter" data-filter="bad">
🤡
</button>

</section>

<div class="divider"></div>

    <!-- Cards Grid -->
    <section class="layout-grid" id="grid"></section>

  </main>

  <!-- Hidden File Input -->
  <input id="photoInput" type="file" accept="image/*" hidden>

  <!-- =========================
       Bottom Navigation
  ========================== -->
  <nav class="bottom-nav" role="navigation" aria-label="Навигация">

    <button 
      class="nav-emoji" 
      data-page="home" 
      title="Главная"
      aria-label="Главная"
    >
      🏠
    </button>

    <button 
  id="addBtn" 
  class="add-btn" 
  aria-label="Добавить фото"
>
+
</button>

    <button 
      class="nav-emoji" 
      data-page="categories" 
      title="Категории"
      aria-label="Категории"
    >
      📂
    </button>

  </nav>

  <script src="/script.js"></script>
</body>
</html>
