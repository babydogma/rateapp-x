<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover" />
<title>RateApp X</title>

<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png">
<link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0e0e0f" />

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="/style.css">
</head>
<body>

<header class="header">RateApp X</header>
<div id="stats" class="stats">Загрузка...</div>
<div class="divider"></div>

<main class="content">
  <div id="grid" class="grid"></div>
</main>

<!-- скрытый input для фото -->
<input id="photoInput" type="file" accept="image/*" style="display:none" />

<!-- нижняя панель (glass) -->
<nav class="bottom-bar">
  <button id="homeBtn" class="nav-btn" aria-label="Главная">🏠</button>

  <div class="add-wrap">
    <button id="addBtn" class="add-btn" aria-label="Добавить">+</button>
  </div>

  <button id="catsBtn" class="nav-btn" aria-label="Категории">📂</button>
</nav>

<script src="/script.js"></script>
</body>
</html>
