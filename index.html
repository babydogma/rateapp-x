<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>RateApp X</title>

<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png">
<link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0e0e0f" />

<!-- внешний CSS -->
<link rel="stylesheet" href="/style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="header">RateApp X</div>
<div class="stats" id="stats">Загрузка...</div>
<div class="divider"></div>
<div class="grid" id="grid"></div>

<!-- скрытый input для загрузки фото -->
<input id="photoInput" type="file" accept="image/*" style="display:none;">

<!-- нижняя панель (с кнопкой + внутри) -->
<nav class="bottom-nav" role="navigation" aria-label="Навигация">
  <button class="nav-emoji" data-page="home" title="Главная">🏠</button>

  <button id="addBtn" class="add-btn" title="Добавить фото">+</button>

  <button class="nav-emoji" data-page="categories" title="Категории">📂</button>
</nav>

<!-- основной скрипт -->
<script src="/script.js"></script>
</body>
</html>
