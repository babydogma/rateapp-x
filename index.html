<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RateApp X</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

body{
min-height:100vh;
color:#e7e3dc;
background:
radial-gradient(circle at 20% 10%, rgba(212,175,55,0.08), transparent 40%),
radial-gradient(circle at 80% 90%, rgba(184,134,11,0.05), transparent 50%),
linear-gradient(160deg,#0e0e0f,#161618 60%,#0c0c0d);
}

.header{
padding:25px 20px 10px;
text-align:center;
font-size:24px;
font-weight:600;
letter-spacing:1px;
color:#d4af37;
}

.stats{
text-align:center;
font-size:15px;
margin-bottom:20px;
color:#c6b27a;
}

.divider{
height:1px;
margin:0 30px 20px;
background:linear-gradient(to right, transparent, rgba(212,175,55,0.5), transparent);
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:18px;
padding:20px;
padding-bottom:120px;
}

.card{
background:#1a1a1c;
border-radius:18px;
padding:14px;
position:relative;
transition:box-shadow 0.4s ease, transform 0.3s ease;
box-shadow:0 20px 40px rgba(0,0,0,0.6);
}

.card img{
width:100%;
height:150px;
object-fit:cover;
border-radius:14px;
}

.delete-btn{
position:absolute;
top:10px;
right:12px;
font-size:18px;
cursor:pointer;
color:#c6b27a;
opacity:0.8;
}

textarea{
width:100%;
margin-top:10px;
background:#141415;
border:1px solid rgba(212,175,55,0.15);
border-radius:12px;
padding:8px;
color:#e7e3dc;
resize:none;
font-size:13px;
}

.rating{
margin-top:8px;
font-weight:600;
color:#d4af37;
}

.slider{
width:100%;
margin-top:8px;
appearance:none;
height:5px;
border-radius:6px;
background:#2a2a2c;
}

.slider::-webkit-slider-thumb{
appearance:none;
width:16px;
height:16px;
border-radius:50%;
background:#d4af37;
}

.add-btn{
position:fixed;
right:28px;
bottom:28px;
width:70px;
height:70px;
border-radius:50%;
background:#111;
border:1px solid rgba(212,175,55,0.4);
display:flex;
align-items:center;
justify-content:center;
font-size:32px;
color:#d4af37;
cursor:pointer;
box-shadow:0 0 20px rgba(212,175,55,0.2);
}

#photoInput{
display:none;
}
</style>
</head>

<body>

<div class="header">RateApp X</div>
<div class="stats" id="stats">Пока нет оценок</div>
<div class="divider"></div>

<div class="grid" id="grid"></div>

<label class="add-btn">
+
<input id="photoInput" type="file" accept="image/*">
</label>

<script>

const STORAGE_KEY="rateapp_black_gold_v1"
let state={cards:[]}

function save(){
localStorage.setItem(STORAGE_KEY,JSON.stringify(state))
}

function load(){
const data=localStorage.getItem(STORAGE_KEY)
if(data) state=JSON.parse(data)
}
load()

const grid=document.getElementById("grid")
const stats=document.getElementById("stats")
const photoInput=document.getElementById("photoInput")

function calculateStats(){
if(state.cards.length===0){
stats.textContent="Пока нет оценок"
return
}
let sum=0
state.cards.forEach(c=> sum+=c.rating)
let avg=(sum/state.cards.length).toFixed(1)
stats.textContent=`Средняя оценка: ${avg}  •  Карточек: ${state.cards.length}`
}

function getGlowColor(rating){
const hue = 10 + (rating * 4)  // красный → золотой
return `hsl(${hue}, 80%, 55%)`
}

function renderAll(){
grid.innerHTML=""

state.cards.forEach(card=>{
const el=document.createElement("div")
el.className="card"

el.innerHTML=`
<img src="${card.image}">
<div class="delete-btn">✕</div>
<textarea placeholder="Описание">${card.text||""}</textarea>
<div class="rating">${card.rating}/10</div>
<input type="range" min="0" max="10" value="${card.rating}" class="slider">
`

const glowColor=getGlowColor(card.rating)
el.style.boxShadow=`0 35px 60px -25px ${glowColor}`

el.querySelector(".delete-btn").onclick=()=>{
state.cards=state.cards.filter(c=>c.id!==card.id)
save()
renderAll()
}

el.querySelector("textarea").oninput=e=>{
card.text=e.target.value
save()
}

const slider=el.querySelector(".slider")
const rating=el.querySelector(".rating")

slider.oninput=()=>{
card.rating=Number(slider.value)
rating.textContent=slider.value+"/10"

const newColor=getGlowColor(card.rating)
el.style.boxShadow=`0 35px 60px -25px ${newColor}`

save()
calculateStats()
}

grid.appendChild(el)
})

calculateStats()
}

renderAll()

photoInput.addEventListener("change",function(e){
const file=e.target.files[0]
if(!file) return

const reader=new FileReader()
reader.onload=function(event){
const newCard={
id:Date.now(),
image:event.target.result,
text:"",
rating:0
}
state.cards.unshift(newCard)
save()
renderAll()
}
reader.readAsDataURL(file)
photoInput.value=""
})

</script>

</body>
</html>
