<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover" />
<title>RateApp X</title>

<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png">
<link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0e0e0f" />

<!-- подключаем CSS -->
<link rel="stylesheet" href="/style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<header class="top">
  <div class="title">RateApp X</div>
  <div class="stats" id="stats">Загрузка...</div>
  <div class="divider"></div>
</header>

<main>
  <div id="grid" class="grid"></div>
</main>

<!-- нижняя панель -->
<nav class="bottom-nav" role="navigation" aria-label="Навигация">
  <button class="nav-btn" id="nav-home" title="Главная">🏠</button>

  <!-- центр: кнопка добавления + input (input скрыт, но остаётся тем же id) -->
  <div class="nav-center">
    <label class="add-btn" aria-hidden="true">
      <input id="photoInput" type="file" accept="image/*">
      <span class="plus">+</span>
    </label>
  </div>

  <button class="nav-btn" id="nav-cats" title="Категории">📂</button>
</nav>

<!-- маленький helper: ссылка на страницу категорий (клиентская навигация) -->
<script src="/script.js"></script>
</body>
</html>
