<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>RateApp X</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* --- оставил ваши стили без изменений --- */
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
body{min-height:100vh;color:#e7e3dc;background:radial-gradient(circle at 20% 10%, rgba(212,175,55,0.08), transparent 40%),radial-gradient(circle at 80% 90%, rgba(184,134,11,0.05), transparent 50%),linear-gradient(160deg,#0e0e0f,#161618 60%,#0c0c0d)}
.header{padding:25px 20px 10px;text-align:center;font-size:24px;font-weight:600;letter-spacing:1px;color:#d4af37}
.stats{text-align:center;font-size:15px;margin-bottom:20px;color:#c6b27a}
.divider{height:1px;margin:0 30px 20px;background:linear-gradient(to right, transparent, rgba(212,175,55,0.5), transparent)}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px;padding:20px;padding-bottom:120px}
.card{background:#1a1a1c;border-radius:18px;padding:14px;position:relative;box-shadow:0 20px 40px rgba(0,0,0,0.6);transition:0.3s ease}
.card img{width:100%;height:150px;object-fit:cover;border-radius:14px}
.delete-btn{position:absolute;top:10px;right:12px;font-size:18px;cursor:pointer;color:#c6b27a}
textarea{width:100%;margin-top:10px;background:#141415;border:1px solid rgba(212,175,55,0.15);border-radius:12px;padding:8px;color:#e7e3dc;resize:none;font-size:13px}
.rating{margin-top:8px;font-weight:600;color:#d4af37}
.slider{width:100%;margin-top:8px;appearance:none;height:5px;border-radius:6px;background:#2a2a2c}
.slider::-webkit-slider-thumb{appearance:none;width:16px;height:16px;border-radius:50%;background:#d4af37}
.add-btn{position:fixed;right:28px;bottom:28px;width:70px;height:70px;border-radius:50%;background:#111;border:1px solid rgba(212,175,55,0.4);display:flex;align-items:center;justify-content:center;font-size:32px;color:#d4af37;cursor:pointer;box-shadow:0 0 20px rgba(212,175,55,0.2)}
#photoInput{display:none}
.card-footer{margin-top:10px;color:#c6b27a;font-size:13px}
</style>
</head>
<body>

<div class="header">RateApp X</div>
<div class="stats" id="stats">Загрузка...</div>
<div class="divider"></div>
<div class="grid" id="grid"></div>

<label class="add-btn">+
  <input id="photoInput" type="file" accept="image/*" />
</label>

<script>
/* --- сюда впиши свои значения (или используй переменные окружения на проде) --- */
const SUPABASE_URL = "https://qlogmylywwdbczxolidl.supabase.co";
const SUPABASE_KEY = "sb_publishable_nVqkHQmgMKoA_F_ft7yfXQ_OWjYq7f4";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const grid = document.getElementById('grid');
const stats = document.getElementById('stats');
const photoInput = document.getElementById('photoInput');

function getGlowColor(rating){
  const hue = 10 + (rating * 4);
  return `hsl(${hue}, 80%, 55%)`;
}

/* форматируем дату в DD.MM.YYYY (без времени) */
function formatDateShort(dateStr){
  if(!dateStr) return '';
  const d = new Date(dateStr);
  if (isNaN(d)) return dateStr;
  const dd = String(d.getDate()).padStart(2,'0');
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const yyyy = d.getFullYear();
  return `${dd}.${mm}.${yyyy}`;
}

/* helper: найти имя PK/идентификатора и его значение для строки */
function detectPk(card){
  // чаще всего: uuid или id
  if(card.uuid) return { col: 'uuid', val: card.uuid };
  if(card.id) return { col: 'id', val: card.id };
  // fallback: ищем поле, которое явно выглядит как id
  const idKey = Object.keys(card).find(k => /(^|_)id$/i.test(k) || k.toLowerCase().includes('uuid'));
  if(idKey) return { col: idKey, val: card[idKey] };
  // ничего не нашли
  return { col: null, val: null };
}

async function loadCards(){
  stats.textContent = 'Загрузка...';

  const { data, error } = await supabaseClient
    .from('cards')
    .select('*')
    .order('created_at', { ascending: false });

  if(error){
    console.error(error);
    stats.textContent = 'Ошибка загрузки';
    return;
  }

  grid.innerHTML = '';
  let sum = 0;

  if(!data || data.length === 0){
    stats.textContent = 'Пока нет карточек';
    return;
  }

  data.forEach(card => {
    sum += (card.rating || 0);

    const el = document.createElement('div');
    el.className = 'card';
    el.style.boxShadow = `0 35px 60px -25px ${getGlowColor(card.rating || 0)}`;

    // created date formatted
    const createdShown = card.created_at ? formatDateShort(card.created_at) : '';

    el.innerHTML = `
      <img src="${card.image_url || ''}">
      <div class="delete-btn">✕</div>
      <textarea placeholder="Описание">${card.text || ''}</textarea>
      <div class="rating">${card.rating || 0}/10</div>
      <input type="range" min="0" max="10" value="${card.rating || 0}" class="slider">
      <div class="card-footer">создано: ${createdShown}</div>
    `;

    // Удаление — используем обнаружение PK
    el.querySelector('.delete-btn').onclick = async () => {
      const { col, val } = detectPk(card);
      if(!col || !val){
        alert('Ошибка удаления: uuid/id не найден для этой карточки');
        return;
      }

      const { error } = await supabaseClient
        .from('cards')
        .delete()
        .eq(col, val);

      if(error){
        console.error(error);
        alert('Ошибка удаления: ' + (error.message || JSON.stringify(error)));
        return;
      }

      await loadCards();
    };

    // Обновление текста
    el.querySelector('textarea').oninput = async (e) => {
      const { col, val } = detectPk(card);
      if(!col || !val){
        alert('Ошибка обновления: uuid/id не найден для этой карточки');
        return;
      }
      const newText = e.target.value;
      const { error } = await supabaseClient
        .from('cards')
        .update({ text: newText })
        .eq(col, val);

      if(error){
        console.error(error);
        alert('Ошибка записи текста: ' + (error.message || JSON.stringify(error)));
      }
    };

    const slider = el.querySelector('.slider');
    const ratingEl = el.querySelector('.rating');

    slider.addEventListener('input', () => {
      // обновляем UI мгновенно
      ratingEl.textContent = slider.value + '/10';
      el.style.boxShadow = `0 35px 60px -25px ${getGlowColor(Number(slider.value))}`;
    });

    slider.addEventListener('change', async () => {
      const newRating = Number(slider.value);
      const { col, val } = detectPk(card);
      if(!col || !val){
        alert('Ошибка обновления рейтинга: uuid/id не найден');
        // откатим слайдер в UI к 0 (или оригинальному)
        await loadCards();
        return;
      }

      const { error } = await supabaseClient
        .from('cards')
        .update({ rating: newRating })
        .eq(col, val);

      if(error){
        console.error(error);
        alert('Ошибка обновления рейтинга: ' + (error.message || JSON.stringify(error)));
        await loadCards();
        return;
      }

      await loadCards();
    });

    grid.appendChild(el);
  });

  stats.textContent = `Средняя оценка: ${(sum/data.length).toFixed(1)} • Карточек: ${data.length}`;
}

/* --- загрузка фото --- */
photoInput.addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if(!file) return;

  const fileName = Date.now() + '-' + file.name;

  const { error: uploadError } = await supabaseClient
    .storage
    .from('photos')
    .upload(fileName, file);

  if(uploadError){
    console.error(uploadError);
    alert('Ошибка загрузки');
    return;
  }

  const { data } = supabaseClient
    .storage
    .from('photos')
    .getPublicUrl(fileName);

  const publicUrl = data.publicUrl;

  const { error: insertError } = await supabaseClient
    .from('cards')
    .insert([{
      image_url: publicUrl,
      text: "",
      rating: 0
    }]);

  if(insertError){
    console.error(insertError);
    alert('Ошибка записи в БД: ' + (insertError.message || JSON.stringify(insertError)));
    return;
  }

  await loadCards();
  photoInput.value = '';
});

loadCards();
</script>
</body>
</html>
