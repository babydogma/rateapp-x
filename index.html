<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>RateApp X</title>

<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png">
<link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0e0e0f" />

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<!-- DESCRIPTION MODAL -->
<div id="descriptionModal" class="description-modal">
  <div class="description-box">
    <textarea id="descriptionInput" placeholder="Введите описание..."></textarea>
    <button id="saveDescription">Сохранить</button>
  </div>
</div>

<!-- IMAGE MODAL -->
<div id="imageModal" class="image-modal">
  <img id="modalImg" alt="Preview">
</div>

<main class="app">

  <!-- HEADER -->
  <header class="header">
    <div class="app-title">
      <div class="logo-text">RateApp X</div>
    </div>
  </header>

  <div class="divider"></div>

  <!-- STATS -->
  <section class="stats" id="stats">
    Загрузка...
  </section>

  <div class="divider"></div>

  <!-- FILTERS -->
  <section class="rating-filters">

    <button id="filterGood" class="rating-filter" data-filter="good">🤩</button>
    <button id="filterMid" class="rating-filter" data-filter="mid">😏</button>
    <button id="filterBad" class="rating-filter" data-filter="bad">🤡</button>

  </section>

  <div class="divider"></div>

  <!-- CARDS -->
  <section class="layout-grid" id="grid"></section>

</main>

<!-- FILE INPUT -->
<input id="photoInput" type="file" accept="image/*" hidden>

<!-- NAV -->
<nav class="bottom-nav">

  <button class="nav-emoji" data-page="home">🏠</button>

  <button id="addBtn" class="add-btn">+</button>

  <button class="nav-emoji" data-page="categories">📂</button>

</nav>

<script src="script.js"></script>

</body>
</html>
