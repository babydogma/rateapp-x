<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RateApp X</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

body{
min-height:100vh;
color:white;
background:
radial-gradient(circle at 15% 10%, rgba(59,130,246,0.15), transparent 45%),
radial-gradient(circle at 85% 90%, rgba(0,180,255,0.1), transparent 40%),
linear-gradient(160deg,#070c1a,#0f1f44 60%,#0b1a38);
}

.header{
padding:20px;
text-align:center;
font-size:22px;
font-weight:600;
}

.divider{
height:1px;
margin:15px 25px;
background:linear-gradient(to right, transparent, rgba(255,255,255,0.4), transparent);
}

.top-section{
margin:10px 20px 20px;
padding:20px;
border-radius:22px;
background:rgba(255,255,255,0.06);
backdrop-filter:blur(20px);
}

.top-title{
text-align:center;
margin-bottom:20px;
font-weight:600;
}

.podium{
display:flex;
align-items:flex-end;
justify-content:center;
gap:12px;
height:140px;
}

.place{
flex:1;
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-end;
border-radius:16px;
background:rgba(255,255,255,0.08);
padding:8px;
font-size:12px;
text-align:center;
}

.place img{
width:100%;
height:60px;
object-fit:cover;
border-radius:8px;
margin-bottom:6px;
}

.first{height:130px;}
.second{height:100px;}
.third{height:85px;}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:18px;
padding:22px;
padding-bottom:120px;
}

.card{
background:rgba(255,255,255,0.06);
backdrop-filter:blur(28px);
border-radius:22px;
padding:14px;
box-shadow:0 20px 50px rgba(0,0,0,0.45);
position:relative;
}

.card img{
width:100%;
height:155px;
object-fit:cover;
border-radius:16px;
}

.delete-btn{
position:absolute;
top:8px;
right:10px;
font-size:18px;
cursor:pointer;
opacity:0.8;
}

textarea{
width:100%;
margin-top:10px;
background:rgba(255,255,255,0.06);
border:none;
border-radius:14px;
padding:8px;
color:white;
resize:none;
font-size:13px;
}

.rating{
margin-top:8px;
font-weight:600;
}

.slider{
width:100%;
margin-top:8px;
appearance:none;
height:6px;
border-radius:6px;
background:rgba(255,255,255,0.1);
}

.slider::-webkit-slider-thumb{
appearance:none;
width:18px;
height:18px;
border-radius:50%;
background:white;
}

.add-btn{
position:fixed;
right:28px;
bottom:28px;
width:72px;
height:72px;
border-radius:50%;
background:linear-gradient(135deg,#3b82f6,#2563eb);
display:flex;
align-items:center;
justify-content:center;
font-size:36px;
cursor:pointer;
}

#photoInput{
display:none;
}
</style>
</head>

<body>

<div class="header">RateApp X</div>

<div class="divider"></div>

<div class="top-section">
<div class="top-title">🏆 ТОП НЕДЕЛИ</div>
<div class="podium" id="podium"></div>
</div>

<div class="divider"></div>

<div class="grid" id="grid"></div>

<label class="add-btn">
+
<input id="photoInput" type="file" accept="image/*">
</label>

<script>

const STORAGE_KEY="rateapp_final_stable_v1"
let state={cards:[]}

function save(){
localStorage.setItem(STORAGE_KEY,JSON.stringify(state))
}

function load(){
const data=localStorage.getItem(STORAGE_KEY)
if(data) state=JSON.parse(data)
}
load()

const grid=document.getElementById("grid")
const podium=document.getElementById("podium")
const photoInput=document.getElementById("photoInput")

function renderTop(){
const weekAgo=Date.now()-7*24*60*60*1000

const weekly=state.cards
.filter(c=>c.createdAt>=weekAgo && c.rating>=1)
.sort((a,b)=>{
if(b.rating!==a.rating) return b.rating-a.rating
return b.createdAt-a.createdAt
})
.slice(0,3)

podium.innerHTML=""
const order=["second","first","third"]

for(let i=0;i<3;i++){
const div=document.createElement("div")
div.className="place "+order[i]
if(weekly[i]){
div.innerHTML=`<img src="${weekly[i].image}">${weekly[i].rating}/10`
}else{
div.innerHTML="—"
}
podium.appendChild(div)
}
}

function renderAll(){
grid.innerHTML=""
state.cards.forEach(card=>{
const el=document.createElement("div")
el.className="card"
el.innerHTML=`
<img src="${card.image}">
<div class="delete-btn">✕</div>
<textarea placeholder="Описание">${card.text||""}</textarea>
<div class="rating">${card.rating}/10</div>
<input type="range" min="0" max="10" value="${card.rating}" class="slider">
`

el.querySelector(".delete-btn").onclick=()=>{
state.cards=state.cards.filter(c=>c.id!==card.id)
save()
renderAll()
}

el.querySelector("textarea").oninput=e=>{
card.text=e.target.value
save()
}

const slider=el.querySelector(".slider")
const rating=el.querySelector(".rating")
slider.oninput=()=>{
card.rating=Number(slider.value)
rating.textContent=slider.value+"/10"
save()
renderTop()
}

grid.appendChild(el)
})

renderTop()
}

renderAll()

photoInput.addEventListener("change",function(e){
const file=e.target.files[0]
if(!file) return

const reader=new FileReader()
reader.onload=function(event){
compressImage(event.target.result,function(base64){
const newCard={
id:Date.now(),
image:base64,
text:"",
rating:0,
createdAt:Date.now()
}
state.cards.unshift(newCard)
save()
renderAll()
})
}

reader.readAsDataURL(file)
photoInput.value=""
})

function compressImage(base64,callback){
const img=new Image()
img.src=base64
img.onload=function(){
const canvas=document.createElement("canvas")
const maxWidth=800
const scale=maxWidth/img.width
canvas.width=maxWidth
canvas.height=img.height*scale
const ctx=canvas.getContext("2d")
ctx.drawImage(img,0,0,canvas.width,canvas.height)
callback(canvas.toDataURL("image/jpeg",0.7))
}
}

</script>

</body>
</html>
