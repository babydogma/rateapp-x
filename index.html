<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<!-- чтобы iPhone мог растягивать в вырез (safe area) -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>RateApp X</title>

<!-- manifest + apple-touch-icon для иконки на Home Screen -->
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png">
<link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512.png">

<!-- iOS webapp (показывать как standalone при добавлении на Home) -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0e0e0f" />

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}

/* --- ФИКС: фон на html + дубль на body, чтобы при bounce/overscroll не показывался белый ---
   - background на html (заполняет всю область, включая safe-area)
   - body прозрачный фон поверх html, но дублирующий background-color (на случай браузерного поведения)
   - overscroll-behavior-y: none => предотвращает "выпадение" белого при сильном pull
   - -webkit-overflow-scrolling: touch => плавный скролл на iOS
*/
html{
  height:100%;
  background:
    radial-gradient(circle at 20% 10%, rgba(212,175,55,0.08), transparent 40%),
    radial-gradient(circle at 80% 90%, rgba(184,134,11,0.05), transparent 50%),
    linear-gradient(160deg,#0e0e0f,#161618 60%,#0c0c0d);
  background-repeat: no-repeat;
  background-attachment: fixed;
}

body{
  min-height:100vh;
  color:#e7e3dc;
  /* прозрачный — фон берётся с html. НЕ трогаем остальные свойства */
  background: transparent;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior-y: none; /* блокируем bounce, который показывает белое */
  /* безопасные отступы под вырез/тап-бар */
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
}

/* === оригинальные стили (не менял логику) === */
.header{padding:25px 20px 10px;text-align:center;font-size:24px;font-weight:600;letter-spacing:1px;color:#d4af37;}
.stats{text-align:center;font-size:15px;margin-bottom:20px;color:#c6b27a;}
.divider{height:1px;margin:0 30px 20px;background:linear-gradient(to right, transparent, rgba(212,175,55,0.5), transparent);}

/* подстраиваем паддинг снизу контента под safe area (чтобы кнопка не закрывала и не торчала) */
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px;padding:20px;padding-bottom:calc(120px + env(safe-area-inset-bottom));}

.card{background:#1a1a1c;border-radius:18px;padding:14px;position:relative;box-shadow:0 20px 40px rgba(0,0,0,0.6);transition:0.3s ease;}
.card img{width:100%;height:150px;object-fit:cover;border-radius:14px;}
.delete-btn{position:absolute;top:10px;right:12px;font-size:18px;cursor:pointer;color:#c6b27a;}
textarea{width:100%;margin-top:10px;background:#141415;border:1px solid rgba(212,175,55,0.15);border-radius:12px;padding:8px;color:#e7e3dc;resize:none;font-size:13px;}
.rating{margin-top:8px;font-weight:600;color:#d4af37;}
.slider{width:100%;margin-top:8px;appearance:none;height:5px;border-radius:6px;background:#2a2a2c;}
.slider::-webkit-slider-thumb{appearance:none;width:16px;height:16px;border-radius:50%;background:#d4af37;}
.add-btn{
  position:fixed;
  right:28px;
  bottom:calc(28px + env(safe-area-inset-bottom));
  width:70px;height:70px;border-radius:50%;
  background:#111;border:1px solid rgba(212,175,55,0.4);
  display:flex;align-items:center;justify-content:center;font-size:32px;color:#d4af37;cursor:pointer;box-shadow:0 0 20px rgba(212,175,55,0.2);
}
#photoInput{display:none;}
.created{margin-top:10px;color:#c6b27a;font-size:13px;}
</style>
</head>
<body>

<div class="header">RateApp X</div>
<div class="stats" id="stats">Загрузка...</div>
<div class="divider"></div>
<div class="grid" id="grid"></div>

<label class="add-btn">+
  <input id="photoInput" type="file" accept="image/*">
</label>

<script>
/* --- Настройки Supabase (оставь как есть) --- */
const SUPABASE_URL = "https://qlogmylywwdbczxolidl.supabase.co";
const SUPABASE_KEY = "sb_publishable_nVqkHQmgMKoA_F_ft7yfXQ_OWjYq7f4";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* --- DOM --- */
const grid = document.getElementById("grid");
const stats = document.getElementById("stats");
const photoInput = document.getElementById("photoInput");

/* маленькая утилита формата даты -> DD.MM.YYYY */
function formatDateSimple(datestr){
  if(!datestr) return "";
  const d = new Date(datestr);
  if(isNaN(d)) return "";
  const dd = String(d.getDate()).padStart(2,"0");
  const mm = String(d.getMonth()+1).padStart(2,"0");
  const yy = d.getFullYear();
  return `${dd}.${mm}.${yy}`;
}

function getGlowColor(rating){
  const hue = 10 + (rating * 4);
  return `hsl(${hue}, 80%, 55%)`;
}

/* --- загрузка карточек --- */
async function loadCards(){
  const { data, error } = await supabaseClient
    .from("cards")
    .select("*")
    .order("created_at", { ascending: false });

  if(error){
    console.error(error);
    stats.textContent = "Ошибка загрузки";
    return;
  }

  grid.innerHTML = "";
  let sum = 0;

  if(!data || data.length === 0){
    stats.textContent = "Пока нет карточек";
    return;
  }

  data.forEach(card=>{
    sum += (card.rating || 0);

    const el = document.createElement("div");
    el.className = "card";
    el.style.boxShadow = `0 35px 60px -25px ${getGlowColor(card.rating || 0)}`;

    // используем created_at как ключ для операций (удаление/обновление)
    const createdAtRaw = card.created_at;

    el.innerHTML = `
      <img src="${card.image_url || ""}">
      <div class="delete-btn">✕</div>
      <textarea placeholder="Описание">${card.text || ""}</textarea>
      <div class="rating">${card.rating || 0}/10</div>
      <input type="range" min="0" max="10" value="${card.rating || 0}" class="slider">
      <div class="created">${formatDateSimple(createdAtRaw)}</div>
    `;

    // удаление
    el.querySelector(".delete-btn").onclick = async () => {
      if(!createdAtRaw){
        alert("Ошибка удаления: uuid/id не найден для этой карточки");
        return;
      }

      const { error: delError } = await supabaseClient
        .from("cards")
        .delete()
        .eq("created_at", createdAtRaw);

      if(delError){
        console.error(delError);
        alert("Ошибка удаления: " + (delError.message || delError));
        return;
      }

      await loadCards();
    };

    // правка текста
    el.querySelector("textarea").oninput = async (e) => {
      if(!createdAtRaw) return;
      await supabaseClient
        .from("cards")
        .update({ text: e.target.value })
        .eq("created_at", createdAtRaw);
    };

    // слайдер (обновление рейтинга)
    const slider = el.querySelector(".slider");
    const ratingEl = el.querySelector(".rating");

    slider.addEventListener("change", async () => {
      const newRating = Number(slider.value);
      ratingEl.textContent = newRating + "/10";
      el.style.boxShadow = `0 35px 60px -25px ${getGlowColor(newRating)}`;

      if(!createdAtRaw){
        alert("Ошибка обновления рейтинга: uuid/id не найден");
        return;
      }

      const { error: updateError } = await supabaseClient
        .from("cards")
        .update({ rating: newRating })
        .eq("created_at", createdAtRaw);

      if(updateError){
        console.error(updateError);
        alert("Ошибка обновления рейтинга: " + (updateError.message || updateError));
        return;
      }

      await loadCards();
    });

    grid.appendChild(el);
  });

  stats.textContent = `Средняя оценка: ${(sum/data.length).toFixed(1)} • Карточек: ${data.length}`;
}

/* --- загрузка фото (storage) и вставка записи --- */
photoInput.addEventListener("change", async (e) => {
  const file = e.target.files[0];
  if(!file) return;

  const fileName = Date.now() + "-" + file.name;

  const { error: uploadError } = await supabaseClient
    .storage
    .from("photos")
    .upload(fileName, file);

  if(uploadError){
    console.error(uploadError);
    alert("Ошибка загрузки");
    return;
  }

  const { data } = supabaseClient
    .storage
    .from("photos")
    .getPublicUrl(fileName);

  const publicUrl = data.publicUrl;

  const { error: insertError } = await supabaseClient
    .from("cards")
    .insert([{
      image_url: publicUrl,
      text: "",
      rating: 0
    }]);

  if(insertError){
    console.error(insertError);
    alert("Ошибка записи в БД");
    return;
  }

  await loadCards();
  photoInput.value = "";
});

/* регистрация service worker (если он есть) — не ломает, но улучшает PWA поведение */
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/service-worker.js').catch(()=>{/* silent */});
}

/* старт */
loadCards();
</script>

</body>
</html>
