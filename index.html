<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>RateApp X</title>

<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png">
<link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0e0e0f" />

<link rel="stylesheet" href="/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="header">RateApp X</div>
<div class="stats" id="stats">Загрузка...</div>
<div class="divider"></div>
<div class="grid" id="grid"></div>

<!-- invisible file input (used by fab) -->
<input id="photoInput" type="file" accept="image/*" style="display:none">

<!-- bottom nav wrapper -->
<div class="bottom-nav-wrap">
  <div class="bottom-nav">
    <a class="nav-item active" href="/index.html" id="nav-home">
      <span class="icon">🏠</span>
      <span class="label">Дом</span>
    </a>

    <!-- central fab placeholder (actual button) -->
    <div class="fab-wrap">
      <div class="fab" title="Добавить">+</div>
    </div>

    <a class="nav-item" href="/categories.html" id="nav-cats">
      <span class="icon">📂</span>
      <span class="label">Категории</span>
    </a>
  </div>
</div>

<script src="/script.js"></script>
</body>
</html>
