<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RateApp X</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

body{
min-height:100vh;
color:white;
background:
radial-gradient(circle at 15% 10%, rgba(59,130,246,0.15), transparent 45%),
radial-gradient(circle at 85% 90%, rgba(0,180,255,0.1), transparent 40%),
linear-gradient(160deg,#070c1a,#0f1f44 60%,#0b1a38);
}

.header{
padding:20px 20px 10px;
text-align:center;
font-size:22px;
font-weight:600;
}

.stats{
text-align:center;
font-size:14px;
opacity:0.8;
margin-bottom:15px;
}

.divider{
height:1px;
margin:15px 25px;
background:linear-gradient(to right, transparent, rgba(255,255,255,0.4), transparent);
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:18px;
padding:22px;
padding-bottom:120px;
}

.card{
background:rgba(255,255,255,0.06);
backdrop-filter:blur(28px);
border-radius:22px;
padding:14px;
position:relative;
transition:box-shadow 0.4s ease, transform 0.3s ease;
}

.card img{
width:100%;
height:155px;
object-fit:cover;
border-radius:16px;
}

.delete-btn{
position:absolute;
top:10px;
right:12px;
font-size:18px;
cursor:pointer;
opacity:0.8;
}

textarea{
width:100%;
margin-top:10px;
background:rgba(255,255,255,0.06);
border:none;
border-radius:14px;
padding:8px;
color:white;
resize:none;
font-size:13px;
}

.rating{
margin-top:8px;
font-weight:600;
}

.slider{
width:100%;
margin-top:8px;
appearance:none;
height:6px;
border-radius:6px;
background:rgba(255,255,255,0.1);
}

.slider::-webkit-slider-thumb{
appearance:none;
width:18px;
height:18px;
border-radius:50%;
background:white;
}

.add-btn{
position:fixed;
right:28px;
bottom:28px;
width:72px;
height:72px;
border-radius:50%;
background:linear-gradient(135deg,#3b82f6,#2563eb);
display:flex;
align-items:center;
justify-content:center;
font-size:36px;
cursor:pointer;
}

#photoInput{
display:none;
}
</style>
</head>

<body>

<div class="header">RateApp X</div>
<div class="stats" id="stats">Пока нет оценок</div>
<div class="divider"></div>

<div class="grid" id="grid"></div>

<label class="add-btn">
+
<input id="photoInput" type="file" accept="image/*">
</label>

<script>

const STORAGE_KEY="rateapp_minimal_v2"
let state={cards:[]}

function save(){
localStorage.setItem(STORAGE_KEY,JSON.stringify(state))
}

function load(){
const data=localStorage.getItem(STORAGE_KEY)
if(data) state=JSON.parse(data)
}
load()

const grid=document.getElementById("grid")
const stats=document.getElementById("stats")
const photoInput=document.getElementById("photoInput")

function calculateStats(){
if(state.cards.length===0){
stats.textContent="Пока нет оценок"
return
}

let sum=0
state.cards.forEach(c=> sum+=c.rating)

let avg=(sum/state.cards.length).toFixed(1)
stats.textContent=`Средняя оценка: ${avg}   •   Карточек: ${state.cards.length}`
}

function getGlowColor(rating){
const hue = rating * 18   // 0 → 180
return `hsl(${hue}, 100%, 55%)`
}

function renderAll(){
grid.innerHTML=""

state.cards.forEach(card=>{
const el=document.createElement("div")
el.className="card"

el.innerHTML=`
<img src="${card.image}">
<div class="delete-btn">✕</div>
<textarea placeholder="Описание">${card.text||""}</textarea>
<div class="rating">${card.rating}/10</div>
<input type="range" min="0" max="10" value="${card.rating}" class="slider">
`

const glowColor=getGlowColor(card.rating)
el.style.boxShadow=`0 35px 60px -25px ${glowColor}`

el.querySelector(".delete-btn").onclick=()=>{
state.cards=state.cards.filter(c=>c.id!==card.id)
save()
renderAll()
}

el.querySelector("textarea").oninput=e=>{
card.text=e.target.value
save()
}

const slider=el.querySelector(".slider")
const rating=el.querySelector(".rating")

slider.oninput=()=>{
card.rating=Number(slider.value)
rating.textContent=slider.value+"/10"

const newColor=getGlowColor(card.rating)
el.style.boxShadow=`0 35px 60px -25px ${newColor}`

save()
calculateStats()
}

grid.appendChild(el)
})

calculateStats()
}

renderAll()

photoInput.addEventListener("change",function(e){
const file=e.target.files[0]
if(!file) return

const reader=new FileReader()
reader.onload=function(event){
compressImage(event.target.result,function(base64){
const newCard={
id:Date.now(),
image:base64,
text:"",
rating:0
}
state.cards.unshift(newCard)
save()
renderAll()
})
}

reader.readAsDataURL(file)
photoInput.value=""
})

function compressImage(base64,callback){
const img=new Image()
img.src=base64
img.onload=function(){
const canvas=document.createElement("canvas")
const maxWidth=800
const scale=maxWidth/img.width
canvas.width=maxWidth
canvas.height=img.height*scale
const ctx=canvas.getContext("2d")
ctx.drawImage(img,0,0,canvas.width,canvas.height)
callback(canvas.toDataURL("image/jpeg",0.7))
}
}

</script>

</body>
</html>
