<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>RateApp X — Sleep</title>

<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png">
<link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0e0e0f" />

<link rel="stylesheet" href="style.css?v=20260319-2">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  .sleep-modal {
    align-items: flex-start;
    overflow-y: auto;
    padding:
      calc(env(safe-area-inset-top) + 18px)
      20px
      calc(env(safe-area-inset-bottom) + 18px);
  }

  .sleep-modal-box {
    max-width: 460px;
    max-height: calc(100vh - 36px - env(safe-area-inset-top) - env(safe-area-inset-bottom));
    overflow-y: auto;
    padding: 22px 20px 20px;
    margin: 0 auto;
    scrollbar-width: thin;
  }

  .sleep-modal-box::-webkit-scrollbar {
    width: 6px;
  }

  .sleep-modal-box::-webkit-scrollbar-thumb {
    background: rgba(200, 169, 90, 0.28);
    border-radius: 999px;
  }

  .sleep-modal-box .category-modal__title {
    margin-bottom: 18px;
    line-height: 1.1;
  }

  .sleep-modal-box .category-modal__label {
    margin-bottom: 9px;
  }

  .sleep-modal-box .category-modal__input {
    margin-bottom: 16px;
  }

  .sleep-modal-box input[type="date"],
  .sleep-modal-box input[type="time"] {
    min-height: 70px;
    font-size: 18px;
    font-weight: 600;
    text-align: center;
    color-scheme: dark;
  }

  .sleep-modal-box input[type="date"]::-webkit-date-and-time-value,
  .sleep-modal-box input[type="time"]::-webkit-date-and-time-value {
    text-align: center;
  }

  .sleep-modal-box input[type="date"]::-webkit-calendar-picker-indicator,
  .sleep-modal-box input[type="time"]::-webkit-calendar-picker-indicator {
    opacity: 0.9;
    cursor: pointer;
  }

  .sleep-slider-block {
    margin-top: 2px;
    margin-bottom: 18px;
  }

  .sleep-slider-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 10px;
  }

  .sleep-slider-value {
    min-width: 52px;
    text-align: right;
    font-size: 14px;
    font-weight: 700;
    color: var(--color-gold);
    flex-shrink: 0;
  }

  .sleep-modal-box .slider {
    margin-top: 0;
  }

  .sleep-note-input {
    min-height: 140px;
    resize: vertical;
  }

  @media (max-width: 420px) {
    .sleep-modal {
      padding:
        calc(env(safe-area-inset-top) + 12px)
        14px
        calc(env(safe-area-inset-bottom) + 12px);
    }

    .sleep-modal-box {
      max-height: calc(100vh - 24px - env(safe-area-inset-top) - env(safe-area-inset-bottom));
      padding: 18px;
      border-radius: 14px;
    }

    .sleep-modal-box input[type="date"],
    .sleep-modal-box input[type="time"] {
      min-height: 64px;
      font-size: 17px;
    }

    .sleep-note-input {
      min-height: 120px;
    }
  }
</style>
</head>

<body>

<div id="sleepModal" class="category-modal sleep-modal">
  <div class="category-modal__box sleep-modal-box">
    <div class="category-modal__title">Новая запись сна</div>

    <label class="category-modal__label" for="sleepDateInput">Дата</label>
    <input
      id="sleepDateInput"
      class="category-modal__input"
      type="date"
    >

    <label class="category-modal__label" for="bedTimeInput">Во сколько лёг</label>
    <input
      id="bedTimeInput"
      class="category-modal__input"
      type="time"
      step="60"
    >

    <label class="category-modal__label" for="wakeTimeInput">Во сколько встал</label>
    <input
      id="wakeTimeInput"
      class="category-modal__input"
      type="time"
      step="60"
    >

    <div class="sleep-slider-block">
      <div class="sleep-slider-head">
        <label class="category-modal__label" for="sleepRatingInput">Оценка сна</label>
        <div id="sleepRatingValue" class="sleep-slider-value">0/10</div>
      </div>
      <input
        id="sleepRatingInput"
        class="slider"
        type="range"
        min="0"
        max="10"
        step="0.5"
        value="0"
      >
    </div>

    <div class="sleep-slider-block">
      <div class="sleep-slider-head">
        <label class="category-modal__label" for="moodRatingInput">Настроение</label>
        <div id="moodRatingValue" class="sleep-slider-value">0/10</div>
      </div>
      <input
        id="moodRatingInput"
        class="slider"
        type="range"
        min="0"
        max="10"
        step="0.5"
        value="0"
      >
    </div>

    <label class="category-modal__label" for="sleepNoteInput">Заметка</label>
    <textarea
      id="sleepNoteInput"
      class="category-modal__input sleep-note-input"
      placeholder="Напиши пару слов о сне, самочувствии или причине"
    ></textarea>

    <div class="category-modal__actions">
      <button id="sleepModalCancel" type="button" class="category-modal__btn category-modal__btn--ghost">
        Отмена
      </button>
      <button id="sleepModalSave" type="button" class="category-modal__btn category-modal__btn--primary">
        Сохранить
      </button>
    </div>
  </div>
</div>

<div id="sleepConfirmModal" class="confirm-modal">
  <div class="confirm-modal__box">
    <div class="confirm-modal__title">Удаление записи</div>
    <div class="confirm-modal__text">Удалить эту запись сна?</div>

    <div class="confirm-modal__actions">
      <button id="sleepConfirmCancel" type="button" class="category-modal__btn category-modal__btn--ghost">
        Отмена
      </button>
      <button id="sleepConfirmDelete" type="button" class="category-modal__btn category-modal__btn--danger">
        Удалить
      </button>
    </div>
  </div>
</div>

<main class="app">

  <section class="top-panel">
    <header class="header">
      <div class="app-title">
        <div class="logo-text">Sleep</div>
      </div>
    </header>

    <section class="stats" id="sleepStats">
      HTML загружен
    </section>
  </section>

  <section class="layout-grid" id="sleepList"></section>

</main>

<nav class="bottom-nav">
  <button class="nav-emoji" data-page="home" aria-label="Главная">
    <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M3 10.5L12 3l9 7.5"></path>
      <path d="M5.5 9.5V20h13V9.5"></path>
      <path d="M9.5 20v-5.5h5V20"></path>
    </svg>
  </button>

  <div class="nav-center-slot" aria-hidden="true"></div>

  <button class="nav-emoji is-current" data-page="sleep" aria-label="Сон">
    <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M18.5 14.5A6.5 6.5 0 0 1 9.5 5.5a7.5 7.5 0 1 0 9 9z"></path>
    </svg>
  </button>

  <button class="nav-emoji" data-page="categories" aria-label="Категории">
    <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M3.5 7.5A2.5 2.5 0 0 1 6 5h4l2 2h6A2.5 2.5 0 0 1 20.5 9.5v7A2.5 2.5 0 0 1 18 19H6a2.5 2.5 0 0 1-2.5-2.5z"></path>
      <path d="M3.5 9h17"></path>
    </svg>
  </button>

  <button id="addSleepBtn" class="add-btn" type="button">+</button>
</nav>

<script src="sleep.js?v=20260319-2"></script>

</body>
</html>
