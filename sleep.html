<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>RateApp X — Sleep</title>

<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png">
<link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0e0e0f" />

<link rel="stylesheet" href="style.css?v=20260319-7">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  .sleep-modal {
    align-items: flex-start !important;
    overflow-y: auto !important;
    padding:
      calc(env(safe-area-inset-top) + 18px)
      12px
      calc(env(safe-area-inset-bottom) + 18px) !important;
  }

  .sleep-modal-box {
    width: min(420px, 100%) !important;
    max-width: min(420px, 100%) !important;
    max-height: calc(100vh - 36px - env(safe-area-inset-top) - env(safe-area-inset-bottom)) !important;
    overflow-y: auto !important;
    padding: 20px 16px 18px !important;
    margin: 0 auto !important;
  }

  .sleep-modal-box .category-modal__title {
    margin-bottom: 18px !important;
    line-height: 1.08 !important;
  }

  .sleep-date-wrap {
    width: 100% !important;
    max-width: 250px !important;
    margin: 0 auto 18px !important;
  }

  .sleep-modal-box .category-modal__label {
    display: block !important;
    margin-bottom: 9px !important;
  }

  .sleep-date-shell,
  .sleep-time-shell {
    width: 100% !important;
    border: 1px solid rgba(200, 169, 90, 0.12) !important;
    border-radius: 18px !important;
    background: linear-gradient(180deg, rgba(22, 27, 33, 0.98), rgba(16, 20, 25, 0.98)) !important;
    box-shadow:
      inset 0 1px 0 rgba(255, 255, 255, 0.02),
      0 8px 18px rgba(0, 0, 0, 0.16) !important;
    overflow: hidden !important;
  }

  .sleep-date-shell {
    height: 62px !important;
  }

  .sleep-modal-box .sleep-date-input {
    width: 100% !important;
    height: 62px !important;
    min-height: 62px !important;
    border: none !important;
    outline: none !important;
    background: transparent !important;
    box-shadow: none !important;
    padding: 0 14px !important;
    text-align: center !important;
    font-size: 17px !important;
    font-weight: 600 !important;
    color: #fff !important;
    box-sizing: border-box !important;
    color-scheme: dark !important;
  }

  .sleep-time-row {
    display: flex !important;
    align-items: flex-start !important;
    gap: 12px !important;
    width: 100% !important;
    margin-bottom: 18px !important;
  }

  .sleep-time-field {
    flex: 1 1 0 !important;
    min-width: 0 !important;
  }

  .sleep-time-shell {
    height: 56px !important;
  }

  .sleep-modal-box .sleep-time-input {
    width: 100% !important;
    height: 56px !important;
    min-height: 56px !important;
    border: none !important;
    outline: none !important;
    background: transparent !important;
    box-shadow: none !important;
    padding: 0 10px !important;
    text-align: center !important;
    font-size: 16px !important;
    font-weight: 600 !important;
    color: #fff !important;
    box-sizing: border-box !important;
    color-scheme: dark !important;
    margin: 0 !important;
  }

  .sleep-modal-box .sleep-date-input::-webkit-date-and-time-value,
  .sleep-modal-box .sleep-time-input::-webkit-date-and-time-value {
    text-align: center;
  }

  .sleep-slider-block {
    margin-top: 2px !important;
    margin-bottom: 18px !important;
  }

  .sleep-slider-head {
    display: flex !important;
    align-items: center !important;
    justify-content: space-between !important;
    gap: 12px !important;
    margin-bottom: 10px !important;
  }

  .sleep-slider-value {
    min-width: 52px !important;
    text-align: right !important;
    font-size: 14px !important;
    font-weight: 700 !important;
    color: var(--color-gold) !important;
    flex-shrink: 0 !important;
  }

  .sleep-modal-box .slider {
    margin-top: 0 !important;
  }

  .sleep-note-input {
    width: 100% !important;
    min-height: 120px !important;
    resize: vertical !important;
    box-sizing: border-box !important;
  }

  .sleep-entry-wrap {
    position: relative;
    overflow: hidden;
    border-radius: var(--radius-md);
  }

  .sleep-entry-card {
    will-change: transform;
  }

  .sleep-note-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }

  .sleep-note-text {
    flex: 1;
    min-width: 0;
  }

  .sleep-note-delete-btn {
    width: 30px;
    height: 30px;
    flex: 0 0 30px;
    border: 1px solid rgba(200, 169, 90, 0.16);
    border-radius: 999px;
    background: linear-gradient(180deg, rgba(24, 29, 35, 0.96), rgba(15, 18, 22, 0.96));
    color: var(--color-gold);
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    box-shadow:
      0 8px 18px rgba(0, 0, 0, 0.18),
      inset 0 1px 0 rgba(255, 255, 255, 0.025);
  }

  .sleep-note-delete-btn:active {
    transform: scale(0.95);
  }

  @media (max-width: 420px) {
    .sleep-modal {
      padding:
        calc(env(safe-area-inset-top) + 10px)
        8px
        calc(env(safe-area-inset-bottom) + 10px) !important;
    }

    .sleep-modal-box {
      width: min(390px, 100%) !important;
      max-width: min(390px, 100%) !important;
      padding: 18px 12px 18px !important;
      border-radius: 14px !important;
    }

    .sleep-date-wrap {
      max-width: 230px !important;
      margin-bottom: 16px !important;
    }

    .sleep-date-shell {
      height: 58px !important;
    }

    .sleep-modal-box .sleep-date-input {
      height: 58px !important;
      min-height: 58px !important;
      font-size: 16px !important;
      padding: 0 12px !important;
    }

    .sleep-time-row {
      gap: 10px !important;
      margin-bottom: 16px !important;
    }

    .sleep-time-shell {
      height: 54px !important;
    }

    .sleep-modal-box .sleep-time-input {
      height: 54px !important;
      min-height: 54px !important;
      font-size: 15px !important;
      padding: 0 8px !important;
    }

    .sleep-note-input {
      min-height: 110px !important;
    }
  }
</style>
</head>

<body>

<div id="sleepModal" class="category-modal sleep-modal">
  <div class="category-modal__box sleep-modal-box">
    <div class="category-modal__title">Новая запись сна</div>

    <div class="sleep-date-wrap">
      <label class="category-modal__label" for="sleepDateInput">Дата</label>
      <div class="sleep-date-shell">
        <input
          id="sleepDateInput"
          class="sleep-date-input"
          type="date"
        >
      </div>
    </div>

    <div class="sleep-time-row">
      <div class="sleep-time-field">
        <label class="category-modal__label" for="bedTimeInput">Когда лёг</label>
        <div class="sleep-time-shell">
          <input
            id="bedTimeInput"
            class="sleep-time-input"
            type="time"
            step="60"
          >
        </div>
      </div>

      <div class="sleep-time-field">
        <label class="category-modal__label" for="wakeTimeInput">Когда встал</label>
        <div class="sleep-time-shell">
          <input
            id="wakeTimeInput"
            class="sleep-time-input"
            type="time"
            step="60"
          >
        </div>
      </div>
    </div>

    <div class="sleep-slider-block">
      <div class="sleep-slider-head">
        <label class="category-modal__label" for="sleepRatingInput">Оценка сна</label>
        <div id="sleepRatingValue" class="sleep-slider-value">0/10</div>
      </div>
      <input
        id="sleepRatingInput"
        class="slider"
        type="range"
        min="0"
        max="10"
        step="0.5"
        value="0"
      >
    </div>

    <div class="sleep-slider-block">
      <div class="sleep-slider-head">
        <label class="category-modal__label" for="moodRatingInput">Настроение</label>
        <div id="moodRatingValue" class="sleep-slider-value">0/10</div>
      </div>
      <input
        id="moodRatingInput"
        class="slider"
        type="range"
        min="0"
        max="10"
        step="0.5"
        value="0"
      >
    </div>

    <label class="category-modal__label" for="sleepNoteInput">Заметка</label>
    <textarea
      id="sleepNoteInput"
      class="category-modal__input sleep-note-input"
      placeholder="Напиши пару слов о сне, самочувствии или причине"
    ></textarea>

    <div class="category-modal__actions">
      <button id="sleepModalCancel" type="button" class="category-modal__btn category-modal__btn--ghost">
        Отмена
      </button>
      <button id="sleepModalSave" type="button" class="category-modal__btn category-modal__btn--primary">
        Сохранить
      </button>
    </div>
  </div>
</div>

<div id="sleepConfirmModal" class="confirm-modal">
  <div class="confirm-modal__box">
    <div id="sleepConfirmTitle" class="confirm-modal__title">Удаление</div>
    <div id="sleepConfirmText" class="confirm-modal__text">Вы уверены?</div>

    <div class="confirm-modal__actions">
      <button id="sleepConfirmCancel" type="button" class="category-modal__btn category-modal__btn--ghost">
        Отмена
      </button>
      <button id="sleepConfirmDelete" type="button" class="category-modal__btn category-modal__btn--danger">
        Удалить
      </button>
    </div>
  </div>
</div>

<main class="app">
  <section class="top-panel">
    <header class="header">
      <div class="app-title">
        <div class="logo-text">Sleep</div>
      </div>
    </header>

    <section class="stats" id="sleepStats">
      HTML загружен
    </section>
  </section>

  <section class="layout-grid" id="sleepList"></section>
</main>

<nav class="bottom-nav">
  <button class="nav-emoji" data-page="home" aria-label="Главная">
    <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M3 10.5L12 3l9 7.5"></path>
      <path d="M5.5 9.5V20h13V9.5"></path>
      <path d="M9.5 20v-5.5h5V20"></path>
    </svg>
  </button>

  <div class="nav-center-slot" aria-hidden="true"></div>

  <button class="nav-emoji is-current" data-page="sleep" aria-label="Сон">
    <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M18.5 14.5A6.5 6.5 0 0 1 9.5 5.5a7.5 7.5 0 1 0 9 9z"></path>
    </svg>
  </button>

  <button class="nav-emoji" data-page="categories" aria-label="Категории">
    <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M3.5 7.5A2.5 2.5 0 0 1 6 5h4l2 2h6A2.5 2.5 0 0 1 20.5 9.5v7A2.5 2.5 0 0 1 18 19H6a2.5 2.5 0 0 1-2.5-2.5z"></path>
      <path d="M3.5 9h17"></path>
    </svg>
  </button>

  <button id="addSleepBtn" class="add-btn" type="button">+</button>
</nav>

<script src="sleep.js?v=20260319-7"></script>
</body>
</html>
