<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>RateApp X — Sleep</title>

<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png">
<link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0e0e0f" />

<link rel="stylesheet" href="style.css?v=20260319-10">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
  .sleep-modal {
    align-items: flex-start !important;
    overflow-y: auto !important;
    padding:
      calc(env(safe-area-inset-top) + 18px)
      12px
      calc(env(safe-area-inset-bottom) + 18px) !important;
  }

  .sleep-modal-box {
    width: min(420px, 100%) !important;
    max-width: min(420px, 100%) !important;
    max-height: calc(100vh - 36px - env(safe-area-inset-top) - env(safe-area-inset-bottom)) !important;
    overflow-x: hidden !important;
    overflow-y: auto !important;
    padding: 22px 18px 14px !important;
    margin: 0 auto !important;
  }

  .sleep-modal-inner {
    width: 100%;
    max-width: 360px;
    margin: 0 auto;
  }

  .sleep-modal-box .category-modal__title {
    margin-bottom: 20px !important;
    line-height: 1.08 !important;
    text-align: left !important;
  }

  .sleep-modal-box .category-modal__label {
    display: block !important;
    margin-bottom: 9px !important;
  }

  .sleep-date-wrap {
    width: 100% !important;
    max-width: 250px !important;
    margin: 0 auto 20px !important;
  }

  .sleep-date-wrap .category-modal__label {
    text-align: center !important;
  }

  .sleep-date-shell,
  .sleep-time-shell {
    width: 100% !important;
    border: 1px solid rgba(200, 169, 90, 0.12) !important;
    border-radius: 18px !important;
    background: linear-gradient(180deg, rgba(22, 27, 33, 0.98), rgba(16, 20, 25, 0.98)) !important;
    box-shadow:
      inset 0 1px 0 rgba(255, 255, 255, 0.02),
      0 8px 18px rgba(0, 0, 0, 0.16) !important;
    overflow: hidden !important;
  }

  .sleep-date-shell {
    height: 62px !important;
  }

  .sleep-modal-box .sleep-date-input {
    width: 100% !important;
    height: 62px !important;
    min-height: 62px !important;
    border: none !important;
    outline: none !important;
    background: transparent !important;
    box-shadow: none !important;
    padding: 0 14px !important;
    text-align: center !important;
    font-size: 17px !important;
    font-weight: 600 !important;
    color: #fff !important;
    box-sizing: border-box !important;
    color-scheme: dark !important;
  }

  .sleep-time-row {
    display: flex !important;
    align-items: flex-start !important;
    justify-content: center !important;
    gap: 12px !important;
    width: 100% !important;
    margin: 0 auto 20px !important;
  }

  .sleep-time-field {
    flex: 1 1 0 !important;
    min-width: 0 !important;
    text-align: center !important;
  }

  .sleep-time-field .category-modal__label {
    text-align: center !important;
  }

  .sleep-time-shell {
    height: 56px !important;
  }

  .sleep-modal-box .sleep-time-input {
    width: 100% !important;
    height: 56px !important;
    min-height: 56px !important;
    border: none !important;
    outline: none !important;
    background: transparent !important;
    box-shadow: none !important;
    padding: 0 10px !important;
    text-align: center !important;
    font-size: 16px !important;
    font-weight: 600 !important;
    color: #fff !important;
    box-sizing: border-box !important;
    color-scheme: dark !important;
    margin: 0 !important;
  }

  .sleep-modal-box .sleep-date-input::-webkit-date-and-time-value,
  .sleep-modal-box .sleep-time-input::-webkit-date-and-time-value {
    text-align: center;
  }

  .sleep-slider-block {
    width: 100%;
    margin-top: 0 !important;
    margin-bottom: 20px !important;
  }

  .sleep-slider-head {
    display: flex !important;
    align-items: center !important;
    justify-content: space-between !important;
    gap: 12px !important;
    margin-bottom: 10px !important;
  }

  .sleep-slider-value {
    min-width: 52px !important;
    text-align: right !important;
    font-size: 14px !important;
    font-weight: 700 !important;
    color: var(--color-gold) !important;
    flex-shrink: 0 !important;
  }

  .sleep-modal-box .slider {
    margin-top: 0 !important;
  }

  .sleep-note-wrap {
    width: 100%;
    margin-bottom: 0;
  }

  .sleep-note-input {
    width: 100% !important;
    min-height: 120px !important;
    resize: vertical !important;
    box-sizing: border-box !important;
  }

  .category-modal__actions {
    padding-bottom: 0 !important;
  }

  .category-modal__btn--primary {
    box-shadow: none !important;
  }

  .sleep-entry-wrap {
  position: relative;
  overflow: hidden;
  border-radius: var(--radius-md);
}

.sleep-entry-card {
  position: relative;
  will-change: transform;
  background:
    linear-gradient(180deg, rgba(24, 28, 34, 0.98), rgba(13, 16, 20, 0.98)) !important;
  border: 1px solid rgba(255, 255, 255, 0.045) !important;
  box-shadow:
    0 14px 30px rgba(0, 0, 0, 0.28),
    0 0 0 1px rgba(255, 255, 255, 0.01) !important;
}

.sleep-entry-card::before {
  content: "";
  position: absolute;
  top: 0;
  left: 18px;
  right: 18px;
  height: 2px;
  border-radius: 999px;
  opacity: 0.9;
  pointer-events: none;
}

.sleep-entry-card::after {
  display: none !important;
}

  .sleep-card-content {
    padding: 14px !important;
  }

  .sleep-card-column {
    gap: 12px !important;
  }

  .sleep-card-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }

  .sleep-card-date {
    font-size: 18px;
    font-weight: 700;
    color: var(--color-gold);
  }

  .sleep-status-chip {
  flex-shrink: 0;
  padding: 7px 10px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 700;
  border: 1px solid rgba(255, 255, 255, 0.08);
  background: rgba(255, 255, 255, 0.04);
  color: #e7e3dc;
  box-shadow:
    inset 0 1px 0 rgba(255, 255, 255, 0.03),
    0 0 0 rgba(0, 0, 0, 0);
  transition:
    border-color 0.2s ease,
    box-shadow 0.2s ease,
    background 0.2s ease,
    color 0.2s ease;
}

.sleep-status-chip.is-bad {
  background: rgba(166, 63, 63, 0.16);
  border-color: rgba(166, 63, 63, 0.34);
  color: #f0b0b0;
  box-shadow:
    0 0 18px rgba(166, 63, 63, 0.16),
    0 0 34px rgba(166, 63, 63, 0.08);
}

.sleep-status-chip.is-mid {
  background: rgba(200, 169, 90, 0.14);
  border-color: rgba(200, 169, 90, 0.28);
  color: #e7d09a;
  box-shadow:
    0 0 18px rgba(200, 169, 90, 0.14),
    0 0 30px rgba(200, 169, 90, 0.07);
}

.sleep-status-chip.is-good {
  background: rgba(85, 140, 106, 0.17);
  border-color: rgba(85, 140, 106, 0.30);
  color: #b9e0c6;
  box-shadow:
    0 0 18px rgba(85, 140, 106, 0.14),
    0 0 30px rgba(85, 140, 106, 0.07);
}

.sleep-status-chip.is-great {
  background: rgba(116, 162, 96, 0.18);
  border-color: rgba(116, 162, 96, 0.34);
  color: #d5efb2;
  box-shadow:
    0 0 18px rgba(116, 162, 96, 0.16),
    0 0 32px rgba(116, 162, 96, 0.08);
}

.sleep-status-chip.is-oversleep {
  background: rgba(124, 104, 168, 0.18);
  border-color: rgba(124, 104, 168, 0.32);
  color: #d8c7f4;
  box-shadow:
    0 0 18px rgba(124, 104, 168, 0.16),
    0 0 32px rgba(124, 104, 168, 0.08);
}

  .sleep-entry-card:has(.sleep-status-chip.is-bad)::before {
  background: linear-gradient(90deg, transparent, rgba(166, 63, 63, 0.95), transparent);
}

.sleep-entry-card:has(.sleep-status-chip.is-mid)::before {
  background: linear-gradient(90deg, transparent, rgba(200, 169, 90, 0.95), transparent);
}

.sleep-entry-card:has(.sleep-status-chip.is-good)::before {
  background: linear-gradient(90deg, transparent, rgba(85, 140, 106, 0.95), transparent);
}

.sleep-entry-card:has(.sleep-status-chip.is-great)::before {
  background: linear-gradient(90deg, transparent, rgba(116, 162, 96, 0.98), transparent);
}

.sleep-entry-card:has(.sleep-status-chip.is-oversleep)::before {
  background: linear-gradient(90deg, transparent, rgba(124, 104, 168, 0.95), transparent);
}
  
  .sleep-chip-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .sleep-info-chip,
  .sleep-metric-chip {
    border-radius: 14px;
    border: 1px solid rgba(255, 255, 255, 0.05);
    background: linear-gradient(180deg, rgba(21, 25, 31, 0.96), rgba(13, 16, 20, 0.96));
    box-shadow:
      0 8px 18px rgba(0, 0, 0, 0.18),
      inset 0 1px 0 rgba(255, 255, 255, 0.02);
  }

  .sleep-info-chip {
    padding: 9px 11px;
    font-size: 13px;
    font-weight: 600;
    color: #e3e7ec;
  }

  .sleep-chip-row--metrics {
    gap: 10px;
  }

  .sleep-metric-chip {
    flex: 1 1 0;
    min-width: 0;
    padding: 10px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .sleep-metric-chip span {
    font-size: 12px;
    color: #aeb6c1;
    font-weight: 600;
  }

  .sleep-metric-chip strong {
    font-size: 15px;
    color: var(--color-gold);
    font-weight: 700;
  }

  .sleep-note-block {
    padding: 12px 13px;
    border-radius: 14px;
    background: linear-gradient(180deg, rgba(19, 22, 27, 0.92), rgba(12, 15, 18, 0.96));
    border: 1px solid rgba(255, 255, 255, 0.04);
    color: #c7ccd3;
    font-size: 13px;
    line-height: 1.42;
  }

  .sleep-note-block.is-empty {
    color: #8f99a7;
    font-style: italic;
  }

  @media (max-width: 420px) {
    .sleep-modal {
      padding:
        calc(env(safe-area-inset-top) + 10px)
        8px
        calc(env(safe-area-inset-bottom) + 10px) !important;
    }

    .sleep-modal-box {
      width: min(390px, 100%) !important;
      max-width: min(390px, 100%) !important;
      padding: 18px 12px 12px !important;
      border-radius: 14px !important;
      overflow-x: hidden !important;
    }

    .sleep-modal-inner {
      max-width: 330px;
    }

    .sleep-date-wrap {
      max-width: 230px !important;
      margin-bottom: 18px !important;
    }

    .sleep-date-shell {
      height: 58px !important;
    }

    .sleep-modal-box .sleep-date-input {
      height: 58px !important;
      min-height: 58px !important;
      font-size: 16px !important;
      padding: 0 12px !important;
    }

    .sleep-time-row {
      gap: 10px !important;
      margin-bottom: 18px !important;
    }

    .sleep-time-shell {
      height: 54px !important;
    }

    .sleep-modal-box .sleep-time-input {
      height: 54px !important;
      min-height: 54px !important;
      font-size: 15px !important;
      padding: 0 8px !important;
    }

    .sleep-note-input {
      min-height: 110px !important;
    }

    .sleep-card-date {
      font-size: 17px;
    }

    .sleep-status-chip {
      padding: 6px 9px;
      font-size: 11.5px;
    }

    .sleep-info-chip {
      font-size: 12px;
      padding: 8px 10px;
    }

    .sleep-metric-chip {
      padding: 9px 10px;
    }

    .sleep-metric-chip strong {
      font-size: 14px;
    }
  }
  
  .bottom-nav {
  display: grid !important;
  grid-template-columns: 56px 1fr 56px 56px !important;
  align-items: center !important;
  justify-content: stretch !important;
}

.nav-center-slot {
  width: auto !important;
  flex: none !important;
}

.bottom-nav .nav-emoji[data-page="home"] {
  grid-column: 1;
  justify-self: start;
}

.bottom-nav .nav-center-slot {
  grid-column: 2;
}

.bottom-nav .nav-emoji[data-page="sleep"] {
  grid-column: 3;
  justify-self: end;
}

.bottom-nav .nav-emoji[data-page="categories"] {
  grid-column: 4;
  justify-self: end;
}

@media (max-width: 420px) {
  .bottom-nav {
    grid-template-columns: 50px 1fr 50px 50px !important;
  }
}

</style>
</head>

<body>

<div id="sleepModal" class="category-modal sleep-modal">
  <div class="category-modal__box sleep-modal-box">
    <div class="sleep-modal-inner">
      <div class="category-modal__title">Новая запись сна</div>

      <div class="sleep-date-wrap">
        <label class="category-modal__label" for="sleepDateInput">Дата</label>
        <div class="sleep-date-shell">
          <input
            id="sleepDateInput"
            class="sleep-date-input"
            type="date"
          >
        </div>
      </div>

      <div class="sleep-time-row">
        <div class="sleep-time-field">
          <label class="category-modal__label" for="bedTimeInput">Когда лёг</label>
          <div class="sleep-time-shell">
            <input
              id="bedTimeInput"
              class="sleep-time-input"
              type="time"
              step="60"
            >
          </div>
        </div>

        <div class="sleep-time-field">
          <label class="category-modal__label" for="wakeTimeInput">Когда встал</label>
          <div class="sleep-time-shell">
            <input
              id="wakeTimeInput"
              class="sleep-time-input"
              type="time"
              step="60"
            >
          </div>
        </div>
      </div>

      <div class="sleep-time-row">
  <div class="sleep-time-field">
    <label class="category-modal__label" for="wakeCountInput">Просыпался</label>
    <div class="sleep-time-shell">
      <select id="wakeCountInput" class="sleep-time-input">
        <option value="0">0</option>
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4plus">более 3</option>
      </select>
    </div>
  </div>

  <div class="sleep-time-field">
    <label class="category-modal__label" for="dreamTypeInput">Что снилось</label>
    <div class="sleep-time-shell">
      <select id="dreamTypeInput" class="sleep-time-input">
        <option value="nightmare">кошмар</option>
        <option value="neutral" selected>ничего такого</option>
        <option value="good">кайф</option>
      </select>
    </div>
  </div>
</div>

      <div class="sleep-slider-block">
        <div class="sleep-slider-head">
          <label class="category-modal__label" for="moodRatingInput">Настроение</label>
          <div id="moodRatingValue" class="sleep-slider-value">0/10</div>
        </div>
        <input
          id="moodRatingInput"
          class="slider"
          type="range"
          min="0"
          max="10"
          step="0.5"
          value="0"
        >
      </div>

      <div class="sleep-note-wrap">
        <label class="category-modal__label" for="sleepNoteInput">Заметка</label>
        <textarea
          id="sleepNoteInput"
          class="category-modal__input sleep-note-input"
          placeholder="Напиши пару слов о сне, самочувствии или причине"
        ></textarea>
      </div>

      <div class="category-modal__actions">
        <button id="sleepModalCancel" type="button" class="category-modal__btn category-modal__btn--ghost">
          Отмена
        </button>
        <button id="sleepModalSave" type="button" class="category-modal__btn category-modal__btn--primary">
          Сохранить
        </button>
      </div>
    </div>
  </div>
</div>

<div id="sleepConfirmModal" class="confirm-modal">
  <div class="confirm-modal__box">
    <div id="sleepConfirmTitle" class="confirm-modal__title">Удаление</div>
    <div id="sleepConfirmText" class="confirm-modal__text">Вы уверены?</div>

    <div class="confirm-modal__actions">
      <button id="sleepConfirmCancel" type="button" class="category-modal__btn category-modal__btn--ghost">
        Отмена
      </button>
      <button id="sleepConfirmDelete" type="button" class="category-modal__btn category-modal__btn--danger">
        Удалить
      </button>
    </div>
  </div>
</div>

<main class="app">
  <section class="top-panel">
    <header class="header">
      <div class="app-title">
        <div class="logo-text">Сон</div>
      </div>
    </header>

    <section class="stats" id="sleepStats">
      HTML загружен
    </section>
  </section>

  <section class="layout-grid" id="sleepList"></section>
</main>

<nav class="bottom-nav" role="navigation" aria-label="Навигация">
  <button class="nav-emoji" data-page="home" title="Главная" aria-label="Главная">
    <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M3 10.5L12 3l9 7.5"></path>
      <path d="M5.5 9.5V20h13V9.5"></path>
      <path d="M9.5 20v-5.5h5V20"></path>
    </svg>
  </button>

  <div class="nav-center-slot" aria-hidden="true"></div>

  <button class="nav-emoji" data-page="categories" title="Категории" aria-label="Категории">
    <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M3.5 7.5A2.5 2.5 0 0 1 6 5h4l2 2h6A2.5 2.5 0 0 1 20.5 9.5v7A2.5 2.5 0 0 1 18 19H6a2.5 2.5 0 0 1-2.5-2.5z"></path>
      <path d="M3.5 9h17"></path>
    </svg>
  </button>

  <button class="nav-emoji is-current" data-page="sleep" title="Сон" aria-label="Сон">
    <svg class="nav-icon" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M18.5 14.5A6.5 6.5 0 0 1 9.5 5.5a7.5 7.5 0 1 0 9 9z"></path>
    </svg>
  </button>

  <button id="addSleepBtn" class="add-btn" aria-label="Добавить запись сна" type="button">
    +
  </button>
</nav>

<script src="sleep.js?v=20260319-10"></script>
</body>
</html>
