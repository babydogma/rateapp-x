<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>Категории — RateApp X</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>

<header class="top">
  <div class="title">Категории</div>
  <div class="stats" id="stats">Загрузка...</div>
  <div class="divider"></div>
</header>

<main style="padding:20px;">
  <div class="cats-grid" id="cats">
    <!-- blocks are rendered by JS or fallback markup -->
    <div class="cat-block" data-cat="Фильм">🎬 <span>Фильм</span></div>
    <div class="cat-block" data-cat="Сериалы">📺 <span>Сериалы</span></div>
    <div class="cat-block" data-cat="Еда">🍔 <span>Еда</span></div>
    <div class="cat-block" data-cat="Семья">👪 <span>Семья</span></div>
    <div class="cat-block" data-cat="Разное">🏷️ <span>Разное</span></div>
  </div>

  <div style="margin-top:28px;">
    <a href="/" class="back">← На главную</a>
  </div>
</main>

<nav class="bottom-nav">
  <button class="nav-btn" onclick="location.href='/'">🏠</button>
  <div class="nav-center">
    <label class="add-btn" aria-hidden="true">
      <input id="photoInput" type="file" accept="image/*">
      <span class="plus">+</span>
    </label>
  </div>
  <button class="nav-btn">📂</button>
</nav>

<script>
/* Клиентская навигация: при клике на категорию — переходим на главную с параметром ?cat=имя */
document.querySelectorAll(".cat-block").forEach(b=>{
  b.style.cursor="pointer";
  b.addEventListener("click", ()=> {
    const cat = encodeURIComponent(b.dataset.cat || "Разное");
    location.href = "/?cat=" + cat;
  });
});
</script>

</body>
</html>
