<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Категории — RateApp X</title>

<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png">
<link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0e0e0f" />

<link rel="stylesheet" href="/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="header">Категории</div>
  <div class="stats" id="catsStats">Загрузка...</div>
  <div class="divider"></div>

  <div id="categoriesGrid" class="categories-grid"></div>
  <div class="category-block category-block--add" id="addCategoryBtn">
  <div class="cat-emoji">＋</div>
  <div class="cat-title">Новая категория</div>
</div>

  <!-- нижняя панель (тот же блок для консистентности) -->
  <nav class="bottom-nav" role="navigation" aria-label="Навигация">
    <button class="nav-emoji" data-page="home" title="Главная">🏠</button>

    <button id="addBtnCats" class="add-btn" title="Добавить фото"></button>

    <button class="nav-emoji active" data-page="categories" title="Категории">📂</button>
  </nav>

<script>
/* --- CATEGORIES list (copy of script.js) --- */
const DEFAULT_CATEGORIES = [
  { id: "Фильм", emoji: "🎬" },
  { id: "Сериалы", emoji: "📺" },
  { id: "Еда", emoji: "🍔" },
  { id: "Семья", emoji: "👪" },
  { id: "Разное", emoji: "🔖" }
];

function getCategories(){
  const saved = localStorage.getItem("categories");
  return saved ? JSON.parse(saved) : DEFAULT_CATEGORIES;
}

function saveCategories(cats){
  localStorage.setItem("categories", JSON.stringify(cats));
}

const SUPABASE_URL = "https://qlogmylywwdbczxolidl.supabase.co";
const SUPABASE_KEY = "sb_publishable_nVqkHQmgMKoA_F_ft7yfXQ_OWjYq7f4";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const categoriesGrid = document.getElementById("categoriesGrid");
const catsStats = document.getElementById("catsStats");

function createCategoryBlock(cat){
  const el = document.createElement("a");
  el.className = "category-block";
  el.href = "/index.html?category=" + encodeURIComponent(cat.id);
  el.innerHTML = `<div class="cat-emoji">${cat.emoji}</div><div class="cat-title">${cat.id}</div>`;
  return el;
}

function renderCategoryBlocks(){
  categoriesGrid.innerHTML = "";
  getCategories().forEach(c=>{
    categoriesGrid.appendChild(createCategoryBlock(c));
  });
  catsStats.textContent = ""; // not used here
}

document.getElementById("addBtnCats").addEventListener("click", ()=> {
  // делегируем открытие file input на index.html - открываем сам input, если есть
  // просто перенаправим на главную и откроем диалог (index.js откроет input, если в ссылке ?openUpload=1)
  location.href = "/index.html?openUpload=1";
});

/* nav emoji кнопки */
document.querySelectorAll('.nav-emoji').forEach(btn=>{
  btn.onclick = () => {
    const page = btn.dataset.page;
    if(page === 'home') location.href = '/index.html';
    if(page === 'categories') location.href = '/categories.html';
  };
});

renderCategoryBlocks();
</script>
</body>
</html>
