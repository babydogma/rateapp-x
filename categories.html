<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover" />
<title>Категории — RateApp X</title>

<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png">
<link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0e0e0f" />

<link rel="stylesheet" href="/style.css">
</head>
<body>
<header class="header">Категории</header>
<div id="stats" class="stats">Загрузка...</div>
<div class="divider"></div>

<main class="content categories-grid-wrap">
  <div id="categoriesGrid" class="categories-grid"></div>
  <div style="padding:20px;">
    <a href="/" class="back-link">← На главную</a>
  </div>
</main>

<nav class="bottom-bar categories-bottom">
  <button id="homeBtn2" class="nav-btn" aria-label="Главная">🏠</button>

  <div class="add-wrap">
    <button id="addBtn2" class="add-btn" aria-label="Добавить">+</button>
  </div>

  <button id="catsBtn2" class="nav-btn active" aria-label="Категории">📂</button>
</nav>

<script>
/* простая локальная вставка категорий + навигация */
const categories = [
  { id: 'film', label: 'Фильм', emoji: '🎬' },
  { id: 'series', label: 'Сериалы', emoji: '📺' },
  { id: 'food', label: 'Еда', emoji: '🍔' },
  { id: 'family', label: 'Семья', emoji: '👪' },
  { id: 'other', label: 'Разное', emoji: '🏷️' }
];

const grid = document.getElementById('categoriesGrid');
categories.forEach(cat=>{
  const el = document.createElement('button');
  el.className = 'category-block';
  el.innerHTML = `<span class="cat-emoji">${cat.emoji}</span><span class="cat-label">${cat.label}</span>`;
  el.onclick = () => {
    // переходим на главную и фильтруем по категории
    location.href = '/?category=' + cat.id;
  };
  grid.appendChild(el);
});

document.getElementById('homeBtn2').onclick = () => location.href = '/';
document.getElementById('addBtn2').onclick = () => {
  // прокинуть к index → открыть файл-пикер там
  location.href = '/';
};
</script>
</body>
</html>
