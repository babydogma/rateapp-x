<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Категории — RateApp X</title>

  <link rel="stylesheet" href="/style.css">
  <meta name="theme-color" content="#0e0e0f" />
</head>
<body>
  <header class="top">
    <div class="title">Категории</div>
    <div class="stats">Загрузка...</div>
    <div class="divider"></div>
  </header>

  <main class="cats-main">
    <div id="cats" class="cats-grid"></div>
    <a href="/index.html" class="back">← На главную</a>
  </main>

  <nav class="bottom-nav" role="navigation" aria-label="Navigation">
    <a href="/index.html" class="nav-btn">🏠</a>
    <a class="add-btn-mini" href="#" onclick="document.getElementById('fakeAdd').click();return false;">＋</a>
    <a href="/categories.html" class="nav-btn active">📂</a>
    <input id="fakeAdd" type="file" accept="image/*" style="display:none" onchange="location.href='/'">
  </nav>

  <script>
    // categories list same as in script.js so UX consistent
    const CATS = [
      { id: 'film', title: 'Фильм', emoji: '🎬' },
      { id: 'series', title: 'Сериалы', emoji: '📺' },
      { id: 'food', title: 'Еда', emoji: '🍔' },
      { id: 'family', title: 'Семья', emoji: '👪' },
      { id: 'other', title: 'Разное', emoji: '🏷️' },
    ];

    const container = document.getElementById('cats');
    CATS.forEach(c => {
      const b = document.createElement('button');
      b.className = 'cat-block';
      b.innerHTML = `<span class="cat-emoji">${c.emoji}</span><span class="cat-title">${c.title}</span>`;
      b.onclick = () => {
        // navigate to categories page with a hash we can use to filter
        location.href = `/categories.html#${c.id}`;
      };
      container.appendChild(b);
    });
  </script>
</body>
</html>
