<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Категории — RateApp X</title>

<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png">
<link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0e0e0f" />

<link rel="stylesheet" href="/style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="header" id="cats-title">Категории</div>
<div class="stats" id="stats">Загрузка...</div>
<div class="divider"></div>

<!-- categories list -->
<div id="cats-list" style="padding:20px;">
  <ul style="list-style:none;padding:0;margin:0;">
    <li style="margin-bottom:14px;">
      <a href="?cat=Фильм" style="display:block;padding:14px;border-radius:12px;background:rgba(255,255,255,0.02);color:#d4af37;text-decoration:none;font-size:18px;">🎬 Фильм</a>
    </li>
    <li style="margin-bottom:14px;">
      <a href="?cat=Сериалы" style="display:block;padding:14px;border-radius:12px;background:rgba(255,255,255,0.02);color:#d4af37;text-decoration:none;font-size:18px;">📺 Сериалы</a>
    </li>
    <li style="margin-bottom:14px;">
      <a href="?cat=Еда" style="display:block;padding:14px;border-radius:12px;background:rgba(255,255,255,0.02);color:#d4af37;text-decoration:none;font-size:18px;">🍔 Еда</a>
    </li>
    <li style="margin-bottom:14px;">
      <a href="?cat=Семья" style="display:block;padding:14px;border-radius:12px;background:rgba(255,255,255,0.02);color:#d4af37;text-decoration:none;font-size:18px;">👨‍👩‍👧 Семья</a>
    </li>
    <li style="margin-bottom:14px;">
      <a href="?cat=Разное" style="display:block;padding:14px;border-radius:12px;background:rgba(255,255,255,0.02);color:#d4af37;text-decoration:none;font-size:18px;">📂 Разное</a>
    </li>
  </ul>
</div>

<!-- category view (hidden by default) -->
<div id="cats-view" class="hidden" style="display:none;">
  <div style="padding:8px 20px;">
    <a class="back-link" id="back-to-cats">← На выбор категорий</a>
  </div>
  <div class="grid" id="grid"></div>
</div>

<!-- hidden file input for adding -->
<input id="photoInput" type="file" accept="image/*" style="display:none">

<!-- bottom nav same as index -->
<div class="bottom-nav-wrap">
  <div class="bottom-nav">
    <a class="nav-item" href="/index.html" id="nav-home">
      <span class="icon">🏠</span>
      <span class="label">Дом</span>
    </a>

    <div class="fab-wrap">
      <div class="fab" title="Добавить">+</div>
    </div>

    <a class="nav-item active" href="/categories.html" id="nav-cats">
      <span class="icon">📂</span>
      <span class="label">Категории</span>
    </a>
  </div>
</div>

<script src="/script.js"></script>
<script>
/* categories page specific behavior */
document.addEventListener("DOMContentLoaded", () => {
  const params = new URLSearchParams(location.search);
  const cat = params.get("cat");
  if(cat){
    // show category view
    document.getElementById("cats-list").style.display = "none";
    document.getElementById("cats-view").style.display = "";
    document.getElementById("cats-title").textContent = cat;
    // load filtered (script.js exposes loadCardsFiltered)
    if(typeof loadCardsFiltered === "function"){
      loadCardsFiltered(cat);
    }
  } else {
    document.getElementById("cats-list").style.display = "";
    document.getElementById("cats-view").style.display = "none";
    document.getElementById("cats-title").textContent = "Категории";
    if(stats) stats.textContent = "Загрузка...";
  }

  // back link behavior: go back to categories list (remove ?cat)
  document.getElementById("back-to-cats").addEventListener("click", (ev) => {
    ev.preventDefault();
    history.replaceState({}, "", "/categories.html");
    document.getElementById("cats-list").style.display = "";
    document.getElementById("cats-view").style.display = "none";
    document.getElementById("cats-title").textContent = "Категории";
  });

  // FAB click
  document.querySelectorAll(".fab").forEach(f => {
    f.addEventListener("click", () => {
      document.getElementById("photoInput")?.click();
    });
  });
});
</script>
</body>
</html>
